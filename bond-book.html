<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bond Book - The Ascendant Path</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg-void: #060608;
      --bg-deep: #0a0a10;
      --bg-surface: #0e0e16;
      --bg-card: #0a0a12;
      --bg-card-hover: #0e0e16;
      --bg-elevated: #1a1a24;
      --gold: #c8a96a;
      --gold-dim: #a08548;
      --gold-bright: #e8cc8a;
      --gold-bg: #c8a96a0a;
      --gold-border: #c8a96a1a;
      --gold-glow: #c8a96a22;
      --green: #55bb66;
      --green-soft: #55bb6614;
      --blue: #5a9acc;
      --blue-soft: #5a9acc14;
      --amber: #dd9944;
      --amber-soft: #dd994414;
      --danger: #cc4444;
      --danger-soft: #cc444414;
      --text-primary: #ddd5c8;
      --text-secondary: #555044;
      --text-dim: #333028;
      --text-faint: #222018;
      --border: #1a1a22;
      --border-hover: #2a2a33;
      --track: #1a1a22;
      --font-display: 'Cinzel', serif;
      --font-body: 'Cormorant Garamond', serif;
      --font-ui: system-ui, -apple-system, sans-serif;
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 14px;
      --male-color: #c8a96a;
      --female-color: #c86890;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: var(--bg-void);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 16px;
      line-height: 1.6;
    }

    body {
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    /* Page header */
    .page-header {
      padding: 24px 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .page-header-left h1 {
      font-family: var(--font-display);
      font-size: 17px;
      font-weight: 500;
      color: var(--gold);
      letter-spacing: 0.15em;
      margin-bottom: 8px;
    }

    .page-header-subtitle {
      font-size: 12px;
      color: var(--text-secondary);
      font-family: var(--font-ui);
    }

    .page-header-nav {
      display: flex;
      gap: 32px;
      font-family: var(--font-ui);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .page-header-nav a {
      color: var(--text-secondary);
      text-decoration: none;
      cursor: pointer;
      transition: color 0.2s;
    }

    .page-header-nav a:hover {
      color: var(--gold);
    }

    /* Context strip */
    .context-strip {
      padding: 20px 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      background: var(--bg-surface);
    }

    .stat-chip {
      display: inline-flex;
      gap: 6px;
      align-items: center;
      padding: 8px 14px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 11px;
      font-family: var(--font-ui);
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .stat-chip-label {
      color: var(--text-dim);
    }

    .stat-chip-value {
      color: var(--gold);
      font-weight: 500;
    }

    .gender-badge {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--gold);
      margin-left: 2px;
    }

    .gender-badge.female {
      background: var(--female-color);
    }

    /* Main content */
    .main-content {
      flex: 1;
      padding: 32px;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    /* Vessel panel */
    .vessel-gate-panel {
      background: var(--bg-surface);
      border: 2px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 0;
      overflow: hidden;
      transition: border-color 0.3s;
    }

    .vessel-gate-panel.state-active {
      border-color: var(--gold);
    }

    .vessel-gate-panel.state-damaged {
      border-color: var(--danger);
    }

    .vessel-gate-panel.state-sealed {
      border-color: var(--text-dim);
    }

    .vessel-side {
      background: var(--bg-void);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .vessel-header {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .vessel-kicker {
      font-family: var(--font-ui);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-dim);
    }

    .vessel-title {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 500;
      color: var(--gold);
      letter-spacing: 0.05em;
    }

    .vessel-canvas-wrap {
      width: 100%;
      max-width: 700px;
      margin: 0 auto;
      display: flex;
      justify-content: center;
    }

    #vessel-canvas {
      display: block;
      width: 100%;
      height: auto;
      background: var(--bg-deep);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
    }

    .vessel-qi-bar {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .vessel-qi-label {
      font-family: var(--font-ui);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-dim);
    }

    .vessel-qi-track {
      height: 6px;
      background: var(--track);
      border-radius: 3px;
      overflow: hidden;
    }

    .vessel-qi-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold) 0%, var(--gold-bright) 100%);
      transition: width 0.3s;
    }

    .vessel-action-area {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .action-chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .action-chip {
      padding: 8px 12px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: var(--font-ui);
      font-size: 11px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .action-button {
      padding: 12px 24px;
      background: var(--gold-bg);
      border: 1px solid var(--gold-border);
      color: var(--gold);
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all 0.2s;
    }

    .action-button:hover {
      background: var(--gold-glow);
      border-color: var(--gold);
    }

    .action-button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .action-subnote {
      font-family: var(--font-ui);
      font-size: 10px;
      color: var(--text-dim);
      line-height: 1.4;
    }

    /* Book cards section */
    .books-section {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .books-section-title {
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 500;
      color: var(--gold);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .book-cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
    }

    .book-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 16px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: all 0.2s;
    }

    .book-card:hover {
      background: var(--bg-card-hover);
      border-color: var(--border-hover);
    }

    .book-card-accent {
      height: 3px;
      background: var(--text-dim);
      border-radius: 1.5px;
    }

    .book-card-accent.active {
      background: #cc6699;
    }

    .book-card-accent.completed {
      background: var(--green);
    }

    .book-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
    }

    .book-card-name {
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 500;
      color: var(--gold);
      letter-spacing: 0.05em;
    }

    .book-card-badge {
      padding: 3px 8px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 3px;
      font-family: var(--font-ui);
      font-size: 9px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }

    .book-card-progress {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .book-card-progress-bar {
      height: 4px;
      background: var(--track);
      border-radius: 2px;
      overflow: hidden;
    }

    .book-card-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold) 0%, var(--gold-bright) 100%);
    }

    .book-card-progress-text {
      font-family: var(--font-ui);
      font-size: 10px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* Path strip */
    .path-strip {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin: 20px 0;
      flex-wrap: wrap;
    }

    .path-book {
      font-family: var(--font-ui);
      font-size: 11px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 6px 10px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
    }

    .path-book.active {
      background: var(--gold-bg);
      border-color: var(--gold-border);
      color: var(--gold);
    }

    .path-dot {
      width: 4px;
      height: 4px;
      background: var(--text-dim);
      border-radius: 50%;
    }

    .path-dot.active {
      background: var(--gold);
    }

    /* Action area */
    .action-area {
      display: flex;
      gap: 32px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      font-family: var(--font-ui);
      font-size: 12px;
    }

    .action-area a {
      color: var(--gold);
      text-decoration: none;
      cursor: pointer;
      transition: color 0.2s;
    }

    .action-area a:hover {
      color: var(--gold-bright);
    }

    /* Loading state */
    .loading {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 400px;
      color: var(--text-secondary);
      font-family: var(--font-ui);
      font-size: 12px;
    }

    .loading::after {
      content: '';
      display: inline-block;
      width: 8px;
      height: 8px;
      margin-left: 8px;
      background: var(--gold);
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* Responsive */
    @media (max-width: 768px) {
      .page-header {
        flex-direction: column;
        gap: 16px;
        align-items: flex-start;
      }

      .main-content {
        padding: 16px;
      }

      .book-cards-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="page-header">
    <div class="page-header-left">
      <h1>BOND BOOK</h1>
      <div class="page-header-subtitle" id="header-subtitle"></div>
    </div>
    <div class="page-header-nav">
      <a href="dashboard.html">Dashboard</a>
      <a href="cultivation-book.html">Library</a>
      <a href="store.html">Store</a>
      <a href="#" onclick="logoutUser(); return false;">Logout</a>
    </div>
  </div>

  <div class="context-strip" id="context-strip"></div>

  <div class="main-content" id="main-content">
    <div class="loading">Loading bond data...</div>
  </div>

  <script>
    // Constants
    var ENDPOINTS = {
      session: "/.netlify/functions/load-dashboard-state",
      loadBondState: "/.netlify/functions/load-bond-state",
      offerBond: "/.netlify/functions/offer-bond-book",
      startBond: "/.netlify/functions/start-bond-cultivation",
      syncBond: "/.netlify/functions/sync-bond-cultivation",
      pauseBond: "/.netlify/functions/stop-bond-cultivation"
    };

    // State
    var state = {
      member: null,
      partner: null,
      pageData: null,
      currentBook: null,
      requestedVolumeNumber: 0,
      requestedPartnershipUuid: '',
      requestedLegacyPartnershipId: '',
      displayIsActive: false,
      vesselCanvas: null,
      vesselCtx: null,
      vesselAnimationId: null,
      figureCache: {}
    };

    // Utility functions
    function safeText(val) {
      return (val || '').toString().trim();
    }

    function safeLower(val) {
      return safeText(val).toLowerCase();
    }

    function safeNumber(val) {
      var n = Number(val);
      return isNaN(n) ? 0 : n;
    }

    function safeBoolean(val) {
      return val === true || val === 'true' || val === 1 || val === '1';
    }

    function clamp(val, min, max) {
      return Math.min(Math.max(val, min), max);
    }

    function toTitle(str) {
      if (!str) return '';
      return str.split(' ').map(function(w) {
        return w.charAt(0).toUpperCase() + w.slice(1).toLowerCase();
      }).join(' ');
    }

    function formatPercent(val, total) {
      if (total === 0) return '0%';
      return Math.round((safeNumber(val) / safeNumber(total)) * 100) + '%';
    }

    function formatCount(val) {
      return safeNumber(val).toLocaleString();
    }

    function formatStateLabel(state) {
      var map = {
        'active': 'Cultivating',
        'idle': 'Idle',
        'damaged': 'Damaged',
        'sealed': 'Sealed'
      };
      return map[safeLower(state)] || toTitle(state);
    }

    function coalesce() {
      for (var i = 0; i < arguments.length; i++) {
        if (arguments[i] != null && arguments[i] !== '') return arguments[i];
      }
      return null;
    }

    // Cookie functions
    function parseCookies() {
      var cookies = {};
      if (document.cookie) {
        document.cookie.split('; ').forEach(function(c) {
          var parts = c.split('=');
          if (parts.length === 2) {
            cookies[parts[0]] = decodeURIComponent(parts[1]);
          }
        });
      }
      return cookies;
    }

    function setCookie(name, value, days) {
      var expires = new Date();
      expires.setTime(expires.getTime() + (days * 24 * 60 * 60 * 1000));
      document.cookie = name + '=' + encodeURIComponent(value) + '; path=/; expires=' + expires.toUTCString();
    }

    function clearClientSessionArtifacts() {
      document.cookie = 'auth_token=; path=/; expires=Thu, 01 Jan 1970 00:00:00 UTC';
      document.cookie = 'member_uuid=; path=/; expires=Thu, 01 Jan 1970 00:00:00 UTC';
      localStorage.clear();
    }

    function redirectToLogin() {
      window.location.href = 'login.html';
    }

    // Auth fetch
    function authFetch(url, options) {
      options = options || {};
      options.credentials = 'include';
      return fetch(url, options);
    }

    function logoutUser() {
      clearClientSessionArtifacts();
      redirectToLogin();
    }

    // Session loading
    function loadViewerSession() {
      return authFetch(ENDPOINTS.session, { method: "GET" })
        .then(function(response) {
          return response.json().then(function(data) {
            if (!response.ok || !data.success || !data.member) {
              redirectToLogin();
              return false;
            }
            state.member = data.member;
            return true;
          });
        })
        .catch(function(err) {
          console.error('Session load error:', err);
          redirectToLogin();
          return false;
        });
    }

    // URL params
    function getVolumeNumberFromQuery() {
      var params = new URLSearchParams(window.location.search);
      return safeNumber(params.get('volume')) || 1;
    }

    function getPartnershipUuidFromQuery() {
      var params = new URLSearchParams(window.location.search);
      return safeText(params.get('partnership_uuid')) || '';
    }

    function getLegacyPartnershipIdFromQuery() {
      var params = new URLSearchParams(window.location.search);
      return safeText(params.get('partnership_id')) || '';
    }

    // Book state functions
    function getRecord() {
      if (!state.pageData) return null;
      return state.pageData.bond_record || state.pageData.record || null;
    }

    function getFocusedPartner() {
      if (state.partner) return state.partner;
      var rec = getRecord();
      if (!rec) return null;
      return rec.partner || null;
    }

    function getSelectedVolume() {
      var rec = getRecord();
      if (!rec) return null;
      return rec.volume || rec.selected_volume ||
        (Array.isArray(rec.volumes) && rec.volumes.length ? rec.volumes[0] : null) ||
        null;
    }

    function getBooksForShelf() {
      var vol = getSelectedVolume();
      if (!vol || !vol.books) return [];
      return vol.books;
    }

    function getSelectedBook() {
      var vol = getSelectedVolume();
      if (!vol || !vol.books) return null;
      for (var i = 0; i < vol.books.length; i++) {
        if (vol.books[i].slot_index === state.currentBook) {
          return vol.books[i];
        }
      }
      return null;
    }

    function recordHasPartner() {
      var rec = getRecord();
      return rec && rec.other_member;
    }

    function recordIsAvailable() {
      var rec = getRecord();
      return rec && rec.is_available;
    }

    // Normalize state
    function normalizeSideState(side) {
      if (!side) return { xp: 0, xp_limit: 1, is_meditating: false };
      return {
        xp: safeNumber(side.xp),
        xp_limit: safeNumber(side.xp_limit) || 1,
        is_meditating: safeBoolean(side.is_meditating)
      };
    }

    function normalizePairState(pair) {
      if (!pair) return { xp: 0, xp_limit: 1, is_meditating: false, is_damaged: false };
      return {
        xp: safeNumber(pair.xp),
        xp_limit: safeNumber(pair.xp_limit) || 1,
        is_meditating: safeBoolean(pair.is_meditating),
        is_damaged: safeBoolean(pair.is_damaged)
      };
    }

    // Action state machine
    function getActionSet() {
      var vol = getSelectedVolume();
      if (!vol) return [];

      var pairState = normalizePairState(vol.pair_state);
      var isMeditating = safeBoolean(pairState.is_meditating);
      var isDamaged = safeBoolean(pairState.is_damaged);
      var rec = getRecord();

      var actions = [];

      if (isDamaged) {
        actions.push({
          key: 'repair',
          label: 'Repair Bond',
          title: 'Heal the bond vessel'
        });
      } else if (isMeditating) {
        actions.push({
          key: 'pause',
          label: 'Pause Cultivation',
          title: 'Pause bond meditation'
        });
      } else {
        if (rec && rec.is_available) {
          actions.push({
            key: 'start',
            label: 'Begin Cultivation',
            title: 'Begin cultivating together'
          });
        } else {
          actions.push({
            key: 'offer',
            label: 'Offer Bond',
            title: 'Offer this bond volume'
          });
        }
      }

      return actions;
    }

    // Fetch bond state
    function fetchBookState() {
      if (!state.member) return Promise.resolve(null);

      var params = [];
      if (state.member.sl_avatar_key) {
        params.push('sl_avatar_key=' + encodeURIComponent(state.member.sl_avatar_key));
      }
      if (state.member.sl_username) {
        params.push('sl_username=' + encodeURIComponent(state.member.sl_username));
      }
      if (state.requestedVolumeNumber > 0) {
        params.push('volume_number=' + state.requestedVolumeNumber);
      }
      if (safeText(state.requestedPartnershipUuid)) {
        params.push('partnership_uuid=' + encodeURIComponent(state.requestedPartnershipUuid));
      } else if (safeText(state.requestedLegacyPartnershipId)) {
        params.push('partnership_id=' + encodeURIComponent(state.requestedLegacyPartnershipId));
      }

      var url = ENDPOINTS.loadBondState + '?' + params.join('&');

      return authFetch(url).then(function(response) {
        return response.json().then(function(data) {
          if (!response.ok || !data.success) {
            console.error('Bond state error:', data.message || 'Failed to load');
            return null;
          }
          return data;
        });
      }).catch(function(err) {
        console.error('Fetch bond state error:', err);
        return null;
      });
    }

    function loadBookState() {
      if (!state.member) return Promise.resolve();

      return fetchBookState().then(function(data) {
        if (!data) {
          console.error('No bond data returned');
          renderPage();
          return true;
        }

        state.pageData = data;

        // Merge member data from response
        var memberUpdate = data.user || data.member || {};
        var mk;
        for (mk in memberUpdate) {
          if (memberUpdate.hasOwnProperty(mk)) {
            state.member[mk] = memberUpdate[mk];
          }
        }

        // Extract partner from response
        state.partner = data.partner ||
          (data.partnership ? data.partnership.counterpart : null) ||
          data.counterpart || null;

        // Update IDs from bond record if available
        var rec = getRecord();
        if (rec) {
          if (safeNumber(rec.selected_volume_number, 0) > 0) {
            state.requestedVolumeNumber = safeNumber(rec.selected_volume_number, 0);
          }
          if (safeText(rec.partnership_uuid)) {
            state.requestedPartnershipUuid = safeText(rec.partnership_uuid);
          }
          if (safeText(rec.partnership_id)) {
            state.requestedLegacyPartnershipId = safeText(rec.partnership_id);
          }
        }

        renderPage();
        startAutoRefreshLoop();
        maybeCheckBreakthroughParams();

        return true;
      });
    }

    // Render functions
    function renderPage() {
      renderContextStrip();
      renderMainContent();
    }

    function renderContextStrip() {
      var vol = getSelectedVolume();
      var pairState = normalizePairState(vol ? vol.pair_state : null);
      var partner = getFocusedPartner();

      var html = '';

      if (state.member) {

    function renderPathStrip(books) {

      for (var i = 0; i < 4; i++) {
        var book = books[i] || { slot_index: i };

        var bookNum = i + 1;
        html += '<div class="path-book' + (isActive ? ' active' : '') + '">Book ' + bookNum + '</div>';

    function renderActionArea() {
      return '<div class="action-area">' +
        '<a href="cultivation-book.html">Back to Library</a>' +
        '<a href="partnerships.html">Partnership Page</a>' +

    }

    // Canvas animation
    function startVesselAnimation(vol, books, pairState) {
      var canvas = document.getElementById('vessel-canvas');
      if (!canvas) return;

      state.vesselCanvas = canvas;
      state.vesselCtx = canvas.getContext('2d');

      var dpr = window.devicePixelRatio || 1;
      canvas.width = 700 * dpr;
      canvas.height = 420 * dpr;
      state.vesselCtx.scale(dpr, dpr);

      runBondVessel(vol, books, pairState);
    }

    var _vesselStartTime = 0;
    var _cinematic = null;
    var _figDamaged = false;

    function runBondVessel(vol, books, pairState) {
      if (!state.vesselCanvas || !state.vesselCtx) return;

      var start = performance.now();

      function frame(now) {
        var t = (now - start) / 1000;
        var ctx = state.vesselCtx;

        ctx.clearRect(0, 0, 700, 420);

        // Dark void background
        ctx.save();
        ctx.fillStyle = '#060608';
        ctx.fillRect(0, 0, 700, 420);
        ctx.restore();

        // Draw ambient
        drawAmbientMountains(ctx, 700, 420, t);
        drawAmbientStarfield(ctx, 700, 420, t);
        drawAmbientQiVeins(ctx, 700, 420, t);

        // Get colors
        var colorA = getGenderColor(state.member);
        var colorB = getGenderColor(state.partner);
        _figDamaged = pairState.is_damaged;

        // Draw cinematic or normal
        if (_cinematic) {
          runCinematicFrame(ctx, 350, 210, colorA, colorB, pairState);
          if (_cinematic.elapsed > _cinematic.duration) {
            _cinematic = null;
          } else {
            _cinematic.elapsed += (now - (_vesselStartTime || now)) / 1000;
          }
        } else {
          drawBondVessel(ctx, 350, 210, colorA, colorB, pairState, t);
        }

        _vesselStartTime = now;
        state.vesselAnimationId = requestAnimationFrame(frame);
      }

      state.vesselAnimationId = requestAnimationFrame(frame);
    }

    function getGenderColor(member) {
      if (!member) return '#c8a96a';
      var gender = member.gender || member.sl_gender || 'male';
      return safeLower(gender) === 'female' ? '#c86890' : '#c8a96a';
    }

    function drawBondVessel(ctx, cx, cy, colorA, colorB, pairState, t) {
      var pct = clamp(pairState.xp / (pairState.xp_limit || 1), 0, 1);

      ctx.save();

      // Platform
      drawBondPlatform(ctx, cx, cy, 200, 50, colorA, 0.3);

      // Figures
      var figA = state.figureCache[getGenderClass(state.member)] || null;
      var figB = state.figureCache[getGenderClass(state.partner)] || null;

      if (!figA && state.member) {
        loadVesselFigure(getGenderClass(state.member), function(canvas) {
          state.figureCache[getGenderClass(state.member)] = canvas;
        });
      }
      if (!figB && state.partner) {
        loadVesselFigure(getGenderClass(state.partner), function(canvas) {
          state.figureCache[getGenderClass(state.partner)] = canvas;
        });
      }

      // Draw figures (cultivation-book scale, wide rectangle layout)
      var figSize = 250;
      var spread = 110;
      var floatA = _figDamaged ? 0 : Math.sin(t * 0.8) * 4;
      var floatB = _figDamaged ? 0 : Math.sin(t * 0.8 + 1.5) * 4;
      var tiltA = _figDamaged ? -0.2 : 0;
      var tiltB = _figDamaged ? 0.2 : 0;
      var figAlpha = _figDamaged ? 0.6 : 0.92;

      ctx.save();
      ctx.globalAlpha = figAlpha;
      ctx.translate(cx - spread, cy);
      ctx.rotate(tiltA);
      ctx.translate(-(cx - spread), -cy);
      if (figA) ctx.drawImage(figA, cx - spread - figSize * 0.5, cy - figSize * 0.55 + floatA, figSize, figSize);
      ctx.restore();

      ctx.save();
      ctx.globalAlpha = figAlpha;
      ctx.translate(cx + spread, cy);
      ctx.rotate(tiltB);
      ctx.translate(-(cx + spread), -cy);
      if (figB) ctx.drawImage(figB, cx + spread - figSize * 0.5, cy - figSize * 0.55 + floatB, figSize, figSize);
      ctx.restore();

      // Auras
      drawVesselQiAura(ctx, cx - 110, cy, 65, pct, colorA, colorB, t, 0);
      drawVesselQiAura(ctx, cx + 110, cy, 65, pct, colorA, colorB, t, Math.PI);

      // Bond link
      drawBondLink(ctx, cx - 110, cy - 20, cx + 110, cy - 20, colorA, colorB, t, _figDamaged);

      // Seal
      if (pct < 0.1) {
        drawBondSealOnVessel(ctx, cx, cy, 120, colorA, colorB, 0.2 * (1 - pct * 10), t);
      }

      ctx.restore();
    }

    function drawBondLink(ctx, ax, ay, bx, by, colorA, colorB, t, damaged) {
      var midX = (ax + bx) / 2;
      var midY = (ay + by) / 2;

      var color = damaged ? '#cc4444' : colorA;
      var alpha = damaged ? 0.3 : 0.6;

      ctx.strokeStyle = color;
      ctx.globalAlpha = alpha;
      ctx.lineWidth = 2;
      ctx.setLineDash([4, 4]);

      ctx.beginPath();
      ctx.quadraticCurveTo((ax + bx) / 2, ay - 40, bx, by);
      ctx.stroke();

      // Pulsing dot
      var pulse = 3 + 2 * Math.sin(t * 3);
      ctx.globalAlpha = 0.8;
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(midX, midY - 35, pulse, 0, Math.PI * 2);
      ctx.fill();

      ctx.setLineDash([]);
      ctx.globalAlpha = 1;
    }

    function drawBondPlatform(ctx, cx, cy, w, h, color, alpha) {
      ctx.globalAlpha = alpha;
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.ellipse(cx, cy + 40, w / 2, h / 2, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    function drawVesselQiAura(ctx, cx, cy, r, pct, c1, c2, t, offset) {
      var rings = 3;
      for (var i = 0; i < rings; i++) {
        var ri = r - i * 12;
        var alpha = 0.3 * (1 - i / rings) * pct * Math.sin(t * 2 + offset);
        ctx.globalAlpha = clamp(alpha, 0, 1);
        ctx.strokeStyle = c1;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(cx, cy, ri, 0, Math.PI * 2);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
    }

    function drawBondSealOnVessel(ctx, cx, cy, baseR, colorA, colorB, alpha, phase) {
      ctx.globalAlpha = alpha;
      ctx.lineWidth = 2;

      // Outer ring
      ctx.strokeStyle = colorA;
      ctx.beginPath();
      ctx.arc(cx, cy, baseR, 0, Math.PI * 2);
      ctx.stroke();

      // Inner ring
      ctx.strokeStyle = colorB;
      ctx.beginPath();
      ctx.arc(cx, cy, baseR - 20, 0, Math.PI * 2);
      ctx.stroke();

      // Rune dots
      for (var i = 0; i < 8; i++) {
        var angle = (i / 8) * Math.PI * 2 + phase;
        var x = cx + Math.cos(angle) * baseR;
        var y = cy + Math.sin(angle) * baseR;
        ctx.fillStyle = i % 2 === 0 ? colorA : colorB;
        ctx.beginPath();
        ctx.arc(x, y, 2, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.globalAlpha = 1;
    }

    function runCinematicFrame(ctx, cx, cy, colorA, colorB, pairState) {
      var elapsed = _cinematic.elapsed;
      var duration = _cinematic.duration;
      var progress = elapsed / duration;

      if (_cinematic.type === 'entering') {
        // Seal forms and shrinks
        var sealAlpha = clamp(progress * 2, 0, 1);
        drawBondSealOnVessel(ctx, cx, cy, 100 * (1 - progress * 0.5), colorA, colorB, sealAlpha, progress * Math.PI * 4);
      } else if (_cinematic.type === 'success') {
        // Figures descend
        var figY = cy - 100 + progress * 100;
        ctx.globalAlpha = 1 - progress * 0.2;
        ctx.fillStyle = '#c8a96a44';
        ctx.beginPath();
        ctx.arc(cx - 110, figY, 55, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(cx + 110, figY, 55, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      } else if (_cinematic.type === 'fail') {
        // Red drop and tilt
        var failY = cy - 80 + progress * 80;
        ctx.globalAlpha = 1 - progress * 0.5;
        ctx.fillStyle = '#cc444444';
        ctx.beginPath();
        ctx.arc(cx - 110, failY, 50, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(cx + 110, failY, 50, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      } else if (_cinematic.type === 'repair') {
        // Heal glow
        var healAlpha = Math.sin(progress * Math.PI) * 0.6;
        ctx.globalAlpha = healAlpha;
        ctx.fillStyle = '#55bb6666';
        ctx.beginPath();
        ctx.arc(cx, cy, 80, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
    }

    var _figLoadingGender = {};
    var _figCallbackQueue = { male: [], female: [] };

    function loadVesselFigure(gender, callback) {
      // Already cached?
      if (state.figureCache[gender]) {
        callback(state.figureCache[gender]);
        return;
      }

      // Queue callback
      _figCallbackQueue[gender] = _figCallbackQueue[gender] || [];
      _figCallbackQueue[gender].push(callback);

      // Already loading this gender?
      if (_figLoadingGender[gender]) return;
      _figLoadingGender[gender] = true;

      var url = (gender === 'female') ? '/images/female-figure.svg' : '/images/figure.svg';
      var img = new Image();
      img.crossOrigin = 'anonymous';

      img.onload = function() {
        try {
          var off = document.createElement('canvas');
          off.width = 1024;
          off.height = 1024;
          var ctx2 = off.getContext('2d');
          ctx2.drawImage(img, 0, 0);
          var id = ctx2.getImageData(0, 0, 1024, 1024);
          var d = id.data;
          var rgb = (gender === 'female') ? [200, 104, 144] : [200, 169, 106];
          for (var i = 0; i < d.length; i += 4) {
            if (d[i+3] > 10 && d[i] < 80 && d[i+1] < 80 && d[i+2] < 80) {
              d[i] = rgb[0]; d[i+1] = rgb[1]; d[i+2] = rgb[2];
            } else {
              d[i+3] = 0;
            }
          }
          ctx2.putImageData(id, 0, 0);
          state.figureCache[gender] = off;
        } catch(e) {
          console.error('Figure recolor error:', e);
          state.figureCache[gender] = null;
        }
        _figLoadingGender[gender] = false;
        var cbs = (_figCallbackQueue[gender] || []).slice();
        _figCallbackQueue[gender] = [];
        for (var j = 0; j < cbs.length; j++) {
          cbs[j](state.figureCache[gender]);
        }
      };

      img.onerror = function() {
        console.error('Failed to load figure SVG:', url);
        state.figureCache[gender] = null;
        _figLoadingGender[gender] = false;
        var cbs = (_figCallbackQueue[gender] || []).slice();
        _figCallbackQueue[gender] = [];
        for (var j = 0; j < cbs.length; j++) {
          cbs[j](null);
        }
      };

      img.src = url;
    }

    // Ambient drawing
    function drawAmbientMountains(ctx, w, h, t) {
      ctx.globalAlpha = 0.05;
      ctx.strokeStyle = '#c8a96a';
      ctx.lineWidth = 2;

      for (var i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.moveTo(0, h - 50 - i * 20);
        ctx.quadraticCurveTo(w * 0.5, h - 100 - i * 30, w, h - 50 - i * 20);
        ctx.stroke();
      }

      ctx.globalAlpha = 1;
    }

    function drawAmbientStarfield(ctx, w, h, t) {
      ctx.globalAlpha = 0.3;
      ctx.fillStyle = '#c8a96a';

      for (var i = 0; i < 50; i++) {
        var x = (i * 17 + t * 5) % w;
        var y = (i * 13) % h;
        var size = 0.5 + (i % 3) * 0.3;
        ctx.beginPath();
        ctx.arc(x, y, size, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.globalAlpha = 1;
    }

    function drawAmbientQiVeins(ctx, w, h, t) {
      ctx.globalAlpha = 0.08;
      ctx.strokeStyle = '#c8a96a';
      ctx.lineWidth = 1;

      for (var i = 0; i < 5; i++) {
        ctx.beginPath();
        ctx.moveTo(0, h * 0.2 + i * 50);
        for (var j = 0; j < w; j += 20) {
          var y = h * 0.2 + i * 50 + Math.sin(j * 0.02 + t) * 10;
          ctx.lineTo(j, y);
        }
        ctx.stroke();
      }

      ctx.globalAlpha = 1;
    }

    function drawAmbientSeal(ctx, w, h, t) {
      var cx = w / 2;
      var cy = h / 2;
      ctx.globalAlpha = 0.05;
      ctx.strokeStyle = '#c8a96a';
      ctx.lineWidth = 1;

      for (var r = 30; r < 150; r += 25) {
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.stroke();
      }

      ctx.globalAlpha = 1;
    }

    // Cinematic
    function startSealCinematic(type) {
      if (_cinematic) return;
      _cinematic = {
        type: type,
        elapsed: 0,
        duration: type === 'entering' ? 3.2 : type === 'success' ? 3.0 : type === 'fail' ? 3.5 : 3.0
      };
    }

    function stopSealCinematic() {
      _cinematic = null;
    }

    // Action handlers
    function handleControlAction(actionKey) {
      var vol = getSelectedVolume();
      if (!vol) return;

      var endpoint = actionKey === 'offer' ? ENDPOINTS.offerBond :
        actionKey === 'start' ? ENDPOINTS.startBond :
        actionKey === 'pause' ? ENDPOINTS.pauseBond :
        actionKey === 'repair' ? ENDPOINTS.syncBond : null;

      if (!endpoint) return;

      var payload = {
        volume_number: vol.volume_number,
        partnership_uuid: state.requestedPartnershipUuid || '',
        sl_avatar_key: safeText(state.member ? state.member.sl_avatar_key : ''),
        sl_username: safeText(state.member ? state.member.sl_username : '')
      };

      if (state.requestedLegacyPartnershipId) {
        payload.partnership_id = state.requestedLegacyPartnershipId;
      }

      // Disable button during request
      var btn = document.getElementById('action-button');
      if (btn) btn.disabled = true;

      authFetch(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      }).then(function(response) {
        return response.json().then(function(data) {
          if (response.ok && data.success) {
            // Trigger cinematic
            if (actionKey === 'start' || actionKey === 'repair') {
              startSealCinematic(actionKey === 'repair' ? 'repair' : 'success');
            }
            // Refresh after delay
            setTimeout(function() {
              loadBookState();
            }, 1500);
          } else {
            console.error('Action failed:', data.message || 'Unknown error');
            alert(data.message || 'Action failed. Please try again.');
            if (btn) btn.disabled = false;
          }
        });
      }).catch(function(err) {
        console.error('Action error:', err);
        alert('Connection error. Please try again.');
        if (btn) btn.disabled = false;
      });
    }

    function attachActionHandlers() {
      var btn = document.getElementById('action-button');
      if (btn) {
        btn.onclick = function() {
          var actions = getActionSet();
          if (actions.length > 0) {
            handleControlAction(actions[0].key);
          }
        };
      }
    }

    function maybeCheckBreakthroughParams() {
      var params = new URLSearchParams(window.location.search);
      var breakthrough = params.get('breakthrough');
      var repair = params.get('repair');

      if (breakthrough === 'success') {
        startSealCinematic('success');
      } else if (breakthrough === 'failed') {
        startSealCinematic('fail');
      } else if (repair === 'complete') {
        startSealCinematic('repair');
      }
    }

    function maybeAutoSync() {
      var vol = getSelectedVolume();
      if (!vol) return;
      var pairState = normalizePairState(vol.pair_state);
      if (pairState.is_meditating && state.displayIsActive) {
        handleControlAction('pause');
      }
