<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bond Book - The Ascendant Path</title>
<link rel="stylesheet" href="/css/style.css" />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-void: #060608;
    --bg-deep: #0a0a10;
    --bg-surface: #0e0e16;
    --bg-card: #0a0a12;
    --bg-elevated: #12121c;
    --gold: #c8a96a;
    --gold-dim: #a08548;
    --gold-bright: #e8cc8a;
    --gold-border: rgba(200,169,106,0.15);
    --female-color: #c86890;
    --male-color: #c8a96a;
    --text-primary: #e8e4dc;
    --text-secondary: #9a9488;
    --text-dim: #5a564e;
    --border: rgba(200,169,106,0.08);
    --track: rgba(200,169,106,0.06);
    --danger: #cc4444;
    --success: #55bb66;
    --font-display: 'Cinzel', serif;
    --font-body: 'Cormorant Garamond', serif;
    --font-ui: system-ui, -apple-system, sans-serif;
    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 14px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: var(--bg-void);
    color: var(--text-primary);
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased;
  }
  .bond-page {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  .page-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-deep);
  }
  .page-header h1 {
    font-family: var(--font-display);
    font-size: 17px;
    font-weight: 500;
    color: var(--gold);
    letter-spacing: 0.15em;
  }
  .page-header-nav {
    display: flex;
    gap: 24px;
  }
  .page-header-nav a {
    font-family: var(--font-ui);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-secondary);
    text-decoration: none;
    transition: color 0.3s;
  }
  .page-header-nav a:hover { color: var(--gold); }

  /* ── CONTEXT STRIP ── */
  .context-strip {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 14px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-surface);
    flex-wrap: wrap;
  }
  .stat-chip {
    font-family: var(--font-ui);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--text-secondary);
    background: var(--bg-elevated);
    padding: 6px 12px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    white-space: nowrap;
  }
  .stat-chip .label { color: var(--text-dim); margin-right: 6px; }
  .stat-chip .value { color: var(--gold); }

  /* ── MAIN CONTENT ── */
  .main-content {
    flex: 1;
    padding: 24px 32px 32px;
    display: flex;
    flex-direction: column;
    gap: 24px;
    max-width: 1100px;
    margin: 0 auto;
    width: 100%;
  }

  /* ── BOND PANELS ROW ── */
  .bond-panels-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  /* ── PANEL (shared styles) ── */
  .bond-panel {
    border: 1px solid var(--gold-border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    background: var(--bg-deep);
    display: flex;
    flex-direction: column;
  }
  .bond-panel.partner-panel {
    opacity: 0.75;
    border-color: var(--border);
  }
  .panel-header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .panel-kicker {
    font-family: var(--font-ui);
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-dim);
  }
  .panel-name {
    font-family: var(--font-display);
    font-size: 13px;
    color: var(--gold);
    letter-spacing: 0.08em;
  }
  .panel-status-badge {
    font-family: var(--font-ui);
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 3px 8px;
    border-radius: 4px;
    background: var(--bg-elevated);
    color: var(--text-secondary);
    border: 1px solid var(--border);
  }
  .panel-status-badge.active { color: var(--success); border-color: rgba(85,187,102,0.2); }
  .panel-status-badge.completed { color: var(--gold); border-color: var(--gold-border); }

  /* ── CANVAS SECTION ── */
  .panel-canvas-wrap {
    position: relative;
    width: 100%;
    background: var(--bg-void);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 12px 0;
  }
  .panel-canvas-wrap canvas {
    display: block;
    width: 100%;
    max-width: 400px;
    height: auto;
  }

  /* ── PROGRESS SECTION ── */
  .panel-progress {
    padding: 14px 18px;
    border-top: 1px solid var(--border);
  }
  .progress-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 6px;
  }
  .progress-label {
    font-family: var(--font-ui);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-dim);
  }
  .progress-value {
    font-family: var(--font-ui);
    font-size: 11px;
    color: var(--gold);
    letter-spacing: 0.5px;
  }
  .progress-track {
    height: 4px;
    background: var(--track);
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 10px;
  }
  .progress-fill {
    height: 100%;
    border-radius: 3px;
    background: linear-gradient(90deg, var(--gold-dim), var(--gold));
    transition: width 0.8s ease;
  }
  .progress-fill.female {
    background: linear-gradient(90deg, #a04868, var(--female-color));
  }
  .progress-sub {
    font-family: var(--font-ui);
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 0.5px;
  }

  /* ── ACTION AREA (self panel only) ── */
  .panel-action-area {
    padding: 14px 18px 18px;
    border-top: 1px solid var(--border);
  }
  .action-button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: var(--radius-md);
    font-family: var(--font-display);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    background: linear-gradient(135deg, var(--gold-dim), var(--gold));
    color: var(--bg-void);
  }
  .action-button:hover { opacity: 0.9; }
  .action-button:active { transform: scale(0.98); }
  .action-button:disabled {
    background: var(--bg-elevated);
    color: var(--text-dim);
    cursor: not-allowed;
    opacity: 0.6;
  }
  .action-subnote {
    font-family: var(--font-ui);
    font-size: 9px;
    color: var(--text-dim);
    text-align: center;
    margin-top: 8px;
    letter-spacing: 0.5px;
  }

  /* ── SHARED BOND SECTION ── */
  .bond-shared-section {
    border: 1px solid var(--gold-border);
    border-radius: var(--radius-lg);
    background: var(--bg-deep);
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 24px;
  }
  .bond-shared-info {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .bond-shared-label {
    font-family: var(--font-ui);
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-dim);
  }
  .bond-shared-title {
    font-family: var(--font-display);
    font-size: 15px;
    color: var(--gold);
    letter-spacing: 0.08em;
  }
  .bond-qi-section {
    flex: 2;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .bond-qi-track {
    height: 6px;
    background: var(--track);
    border-radius: 4px;
    overflow: hidden;
  }
  .bond-qi-fill {
    height: 100%;
    border-radius: 4px;
    background: linear-gradient(90deg, var(--gold-dim), var(--gold), var(--gold-bright));
    transition: width 0.8s ease;
  }
  .bond-qi-text {
    font-family: var(--font-ui);
    font-size: 10px;
    color: var(--text-secondary);
    letter-spacing: 0.5px;
    display: flex;
    justify-content: space-between;
  }

  /* ── BOOK CARDS ── */
  .books-section-header {
    font-family: var(--font-display);
    font-size: 13px;
    color: var(--gold);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .book-cards-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
  }
  .book-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    position: relative;
    overflow: hidden;
  }
  .book-card-accent {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--text-dim);
  }
  .book-card-accent.active { background: var(--female-color); }
  .book-card-accent.completed { background: var(--success); }
  .book-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .book-card-name {
    font-family: var(--font-display);
    font-size: 12px;
    color: var(--gold);
    letter-spacing: 0.06em;
  }
  .book-card-badge {
    font-family: var(--font-ui);
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    white-space: nowrap;
  }
  .book-card-progress {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .book-card-progress-bar {
    flex: 1;
    height: 3px;
    background: var(--track);
    border-radius: 2px;
    overflow: hidden;
  }
  .book-card-progress-fill {
    height: 100%;
    border-radius: 2px;
    background: linear-gradient(90deg, var(--gold-dim), var(--gold));
  }
  .book-card-progress-text {
    font-family: var(--font-ui);
    font-size: 10px;
    color: var(--text-secondary);
    min-width: 28px;
    text-align: right;
  }

  /* ── PATH STRIP ── */
  .path-strip {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 8px 0;
  }
  .path-book {
    font-family: var(--font-ui);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    background: var(--bg-elevated);
    padding: 6px 12px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
  }
  .path-book.active {
    background: rgba(200,169,106,0.12);
    color: var(--gold);
    border-color: var(--gold-border);
  }
  .path-dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--text-dim);
  }
  .path-dot.active { background: var(--gold-dim); }

  /* ── ACTION AREA (bottom links) ── */
  .bottom-actions {
    display: flex;
    gap: 24px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }
  .bottom-actions a {
    font-family: var(--font-ui);
    font-size: 11px;
    color: var(--text-secondary);
    text-decoration: none;
    letter-spacing: 0.5px;
    transition: color 0.3s;
  }
  .bottom-actions a:hover { color: var(--gold); }

  /* ── LOADING ── */
  .loading-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
    font-family: var(--font-body);
    font-size: 16px;
    letter-spacing: 0.05em;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 800px) {
    .bond-panels-row { grid-template-columns: 1fr; }
    .book-cards-grid { grid-template-columns: repeat(2, 1fr); }
    .main-content { padding: 16px; }
    .page-header { padding: 12px 16px; }
    .context-strip { padding: 10px 16px; }
    .bond-shared-section { flex-direction: column; gap: 14px; }
  }


</style>
</head>
<body>
<div class="cloud-layer"></div>
<div class="rune-layer"></div>
<div class="lightning-flash"></div>

<div class="bond-page">
  <div class="page-header">
    <div class="page-header-left">
      <h1>BOND BOOK</h1>
    </div>
    <nav class="page-header-nav">
      <a href="dashboard.html">Dashboard</a>
      <a href="cultivation-book.html">Library</a>
      <a href="store.html">Store</a>
      <a href="#" id="logout-link">Logout</a>
    </nav>
  </div>
  <div class="context-strip" id="context-strip"></div>
  <div class="main-content" id="main-content">
    <div class="loading-state">Loading bond data...</div>
  </div>
</div>

<script>
  // ── ENDPOINTS ──
  var ENDPOINTS = {
    session: "/.netlify/functions/load-dashboard-state",
    loadBondState: "/.netlify/functions/load-bond-state",
    offerBond: "/.netlify/functions/offer-bond-book",
    startBond: "/.netlify/functions/start-bond-cultivation",
    syncBond: "/.netlify/functions/sync-bond-cultivation",
    pauseBond: "/.netlify/functions/stop-bond-cultivation"
  };

  // ── STATE ──
  var state = {
    member: null,
    partner: null,
    pageData: null,
    requestedVolumeNumber: 0,
    requestedPartnershipUuid: '',
    requestedLegacyPartnershipId: '',
    vesselAnimationId: null,
    figureCache: { male: null, female: null }
  };

  // ── HELPERS ──
  function safeText(v, fb) { var s = String(v == null ? '' : v).trim(); return s || (fb || ''); }
  function safeLower(v) { return safeText(v).toLowerCase(); }
  function safeNumber(v, fb) { var n = Number(v); return isFinite(n) ? n : (fb || 0); }
  function safeBoolean(v) { return v === true || v === 'true' || v === 1; }
  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
  function toTitle(s) { return safeText(s).replace(/\b\w/g, function(c) { return c.toUpperCase(); }); }
  function formatPercent(cur, max) { var m = safeNumber(max, 1); if (m <= 0) m = 1; return Math.round(clamp(safeNumber(cur) / m, 0, 1) * 100) + '%'; }
  function formatStateLabel(s) {
    var map = { idle: 'Idle', cultivating: 'Cultivating', active: 'Active', paused: 'Paused',
      damaged: 'Damaged', sealed: 'Sealed', open: 'Open', complete: 'Complete',
      ready_to_start: 'Ready', ready_for_offering: 'Ready to Offer',
      waiting_for_partner_offering: 'Awaiting Partner', pair_completed: 'Completed',
      awaiting_partner_completion: 'Awaiting Partner', locked: 'Locked', is_active: 'Active' };
    return map[safeLower(s)] || toTitle(s) || 'Idle';
  }
  function isUuid(s) { return /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(safeText(s)); }

  // ── COOKIES / AUTH ──
  function parseCookies() {
    var c = {}; document.cookie.split(';').forEach(function(s) {
      var p = s.trim().split('='); if (p.length >= 2) c[p[0]] = decodeURIComponent(p.slice(1).join('='));
    }); return c;
  }
  function setCookie(n, v, d) {
    var e = ''; if (d) { var dt = new Date(); dt.setTime(dt.getTime() + d * 86400000); e = '; expires=' + dt.toUTCString(); }
    document.cookie = n + '=' + encodeURIComponent(v) + e + '; path=/; SameSite=Lax';
  }
  function clearClientSessionArtifacts() {
    ['session_token','sl_avatar_key','sl_username','display_name'].forEach(function(n) {
      document.cookie = n + '=; expires=Thu, 01 Jan 1970 00:00:00 GMT; path=/';
    });
  }
  function authFetch(url, opts) {
    opts = opts || {};
    opts.credentials = 'include';
    return fetch(url, opts);
  }

  // ── URL PARAMS ──
  function getUrlParams() {
    var p = {};
    window.location.search.replace(/[?&]+([^=&]+)=([^&]*)/gi, function(m, k, v) { p[k] = decodeURIComponent(v); });
    return p;
  }

  // ── DATA ACCESSORS ──
  function getRecord() {
    if (!state.pageData) return null;
    return state.pageData.bond_record || state.pageData.record || null;
  }
  function getFocusedPartner() {
    if (state.partner) return state.partner;
    var rec = getRecord();
    return rec ? (rec.partner || null) : null;
  }
  function getSelectedVolume() {
    var rec = getRecord();
    if (!rec) return null;
    return rec.volume || rec.selected_volume || (Array.isArray(rec.volumes) && rec.volumes.length ? rec.volumes[0] : null) || null;
  }
  function getBooksForShelf() {
    var vol = getSelectedVolume();
    if (!vol) return [];
    return vol.books || vol.book_list || [];
  }
  function getCurrentBook() {
    var rec = getRecord();
    if (!rec) return null;
    return rec.current_book || rec.actionable_book || null;
  }

  // ── GENDER DETECTION ──
  function getMemberGender() {
    if (!state.member) return 'male';
    var g = safeLower(state.member.gender || state.member.sl_gender || '');
    return (g === 'female' || g === 'f') ? 'female' : 'male';
  }
  function getPartnerGender() {
    var p = getFocusedPartner();
    if (!p) return 'male';
    var g = safeLower(p.gender || p.sl_gender || '');
    return (g === 'female' || g === 'f') ? 'female' : 'male';
  }

  // ── FETCH BOND STATE ──
  function fetchBookState() {
    if (!state.member) return Promise.resolve(null);
    var params = [];
    if (state.member.sl_avatar_key) {
      params.push('sl_avatar_key=' + encodeURIComponent(state.member.sl_avatar_key));
    }
    if (state.member.sl_username) {
      params.push('sl_username=' + encodeURIComponent(state.member.sl_username));
    }
    if (state.requestedVolumeNumber > 0) {
      params.push('volume_number=' + state.requestedVolumeNumber);
    }
    if (safeText(state.requestedPartnershipUuid)) {
      params.push('partnership_uuid=' + encodeURIComponent(state.requestedPartnershipUuid));
    } else if (safeText(state.requestedLegacyPartnershipId)) {
      params.push('partnership_id=' + encodeURIComponent(state.requestedLegacyPartnershipId));
    }
    var url = ENDPOINTS.loadBondState + '?' + params.join('&');
    return authFetch(url).then(function(response) {
      return response.json().then(function(data) {
        if (!response.ok || !data.success) {
          console.error('Bond state error:', data.message || 'Failed to load');
          return null;
        }
        return data;
      });
    }).catch(function(err) {
      console.error('Fetch bond state error:', err);
      return null;
    });
  }

  function loadBookState() {
    if (!state.member) return Promise.resolve();
    return fetchBookState().then(function(data) {
      if (!data) { console.error('No bond data returned'); renderPage(); return true; }
      state.pageData = data;
      var memberUpdate = data.user || data.member || {};
      var mk;
      for (mk in memberUpdate) {
        if (memberUpdate.hasOwnProperty(mk)) { state.member[mk] = memberUpdate[mk]; }
      }
      state.partner = data.partner ||
        (data.partnership ? data.partnership.counterpart : null) ||
        data.counterpart || null;
      var rec = getRecord();
      if (rec) {
        if (safeNumber(rec.selected_volume_number, 0) > 0) state.requestedVolumeNumber = safeNumber(rec.selected_volume_number, 0);
        if (safeText(rec.partnership_uuid)) state.requestedPartnershipUuid = safeText(rec.partnership_uuid);
        if (safeText(rec.partnership_id)) state.requestedLegacyPartnershipId = safeText(rec.partnership_id);
      }
      renderPage();
      startAutoRefreshLoop();
      maybeCheckBreakthroughParams();
      return true;
    });
  }

  function loadViewerSession() {
    return authFetch(ENDPOINTS.session).then(function(r) { return r.json(); }).then(function(d) {
      if (!d.success || !d.member) {
        window.location.href = '/login.html';
        return;
      }
      state.member = d.member;
    }).catch(function(err) {
      console.error('Session load error:', err);
      window.location.href = '/login.html';
    });
  }

  // ── AUTO REFRESH ──
  var _refreshInterval = null;
  function startAutoRefreshLoop() {
    if (_refreshInterval) return;
    _refreshInterval = setInterval(function() {
      fetchBookState().then(function(data) {
        if (data) {
          state.pageData = data;
          state.partner = data.partner || (data.partnership ? data.partnership.counterpart : null) || data.counterpart || null;
        }
      });
    }, 10000);
    document.addEventListener('visibilitychange', function() {
      if (!document.hidden) {
        fetchBookState().then(function(data) {
          if (data) { state.pageData = data; renderPage(); }
        });
      }
    });
  }

  function maybeCheckBreakthroughParams() {
    // Placeholder for breakthrough integration
  }

  // ── ACTION STATE MACHINE ──
  function getActionSet() {
    var vol = getSelectedVolume();
    if (!vol) return [];

    var rec = getRecord();
    var currentBook = getCurrentBook();
    var bookState = currentBook ? safeLower(currentBook.display_state) : '';

    var actions = [];

    // Check if personal cultivation is active
    var cultState = state.pageData ? state.pageData.cultivation : null;
    var personalActive = cultState && (cultState.is_active === true || cultState.status === 'cultivating');

    if (personalActive) {
      actions.push({
        key: 'blocked',
        label: 'Personal Cultivation Active',
        title: 'End your personal cultivation session before starting bond cultivation'
      });
      return actions;
    }

    if (bookState === 'pair_completed' || bookState === 'completed') {
      actions.push({
        key: 'breakthrough',
        label: 'Enter Breakthrough',
        title: 'Both partners have completed'
      });
    } else if (bookState === 'awaiting_partner_completion') {
      actions.push({
        key: 'wait',
        label: 'Awaiting Partner',
        title: 'Waiting for partner to complete their cultivation'
      });
    } else if (bookState === 'active' || bookState === 'is_active') {
      actions.push({
        key: 'pause',
        label: 'Pause Cultivation',
        title: 'Pause bond meditation'
      });
    } else if (bookState === 'ready_to_start') {
      actions.push({
        key: 'start',
        label: 'Begin Cultivation',
        title: 'Begin cultivating together'
      });
    } else if (bookState === 'waiting_for_partner_offering') {
      actions.push({
        key: 'wait',
        label: 'Awaiting Partner Offering',
        title: 'Waiting for partner to offer their cultivation points'
      });
    } else if (bookState === 'ready_for_offering' && rec && rec.available) {
      actions.push({
        key: 'offer',
        label: 'Offer Bond',
        title: 'Offer cultivation points for this bond book'
      });
    } else if (bookState === 'paused') {
      actions.push({
        key: 'start',
        label: 'Resume Cultivation',
        title: 'Resume bond cultivation'
      });
    } else if (rec && rec.available) {
      actions.push({
        key: 'start',
        label: 'Begin Cultivation',
        title: 'Begin cultivating together'
      });
    } else {
      actions.push({
        key: 'offer',
        label: 'Offer Bond',
        title: 'Offer this bond volume'
      });
    }

    return actions;
  }

  // ── HANDLE ACTION ──
  function handleControlAction(actionKey) {
    var vol = getSelectedVolume();
    if (!vol) return;

    if (actionKey === 'breakthrough') {
      var rec = getRecord();
      var pUuid = state.requestedPartnershipUuid || '';
      var vNum = vol.volume_number || 1;
      var bNum = (rec && rec.current_book) ? rec.current_book.book_number : (rec ? rec.selected_book_number : 0);
      window.location.href = 'breakthrough.html?partnership_uuid=' + encodeURIComponent(pUuid) + '&volume=' + vNum + '&book=' + bNum;
      return;
    }

    if (actionKey === 'wait' || actionKey === 'blocked') return;

    var endpoint = actionKey === 'offer' ? ENDPOINTS.offerBond :
      actionKey === 'start' ? ENDPOINTS.startBond :
      actionKey === 'pause' ? ENDPOINTS.pauseBond :
      actionKey === 'repair' ? ENDPOINTS.syncBond : null;

    if (!endpoint) return;

    var rec = getRecord();
    var bookNum = 0;
    if (rec && rec.current_book && rec.current_book.book_number) {
      bookNum = rec.current_book.book_number;
    } else if (rec && rec.actionable_book && rec.actionable_book.book_number) {
      bookNum = rec.actionable_book.book_number;
    } else if (rec && rec.selected_book_number) {
      bookNum = rec.selected_book_number;
    }

    var payload = {
      volume_number: vol.volume_number,
      book_number: bookNum || null,
      partnership_uuid: state.requestedPartnershipUuid || '',
      sl_avatar_key: safeText(state.member ? state.member.sl_avatar_key : ''),
      sl_username: safeText(state.member ? state.member.sl_username : '')
    };

    if (state.requestedLegacyPartnershipId) {
      payload.partnership_id = state.requestedLegacyPartnershipId;
    }

    var btn = document.getElementById('self-action-btn');
    if (btn) btn.disabled = true;

    authFetch(endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    }).then(function(response) {
      return response.json().then(function(data) {
        if (response.ok && data.success) {
          setTimeout(function() { loadBookState(); }, 1200);
        } else {
          console.error('Action failed:', data.message || 'Unknown error');
          alert(data.message || 'Action failed. Please try again.');
          if (btn) btn.disabled = false;
        }
      });
    }).catch(function(err) {
      console.error('Action error:', err);
      alert('Network error. Please try again.');
      if (btn) btn.disabled = false;
    });
  }

  // ══════════════════════════════════════════════════════════
  // ── CANVAS ANIMATION (per-panel, with background + rune)
  // ══════════════════════════════════════════════════════════

  var _canvasState = {};

  function startCanvasAnimation(canvasId, gender, isSelf) {
    var cv = document.getElementById(canvasId);
    if (!cv) return;

    var W = cv.width;
    var H = cv.height;
    var cx = W / 2;
    var cy = H / 2;
    var baseR = Math.min(W, H) * 0.38;
    var ctx = cv.getContext('2d');

    // DPR scaling
    var dpr = window.devicePixelRatio || 1;
    cv.width = W * dpr;
    cv.height = H * dpr;
    cv.style.width = W + 'px';
    cv.style.height = H + 'px';
    ctx.scale(dpr, dpr);

    var cState = {
      t: Math.random() * 10,
      figImg: null,
      gender: gender,
      isSelf: isSelf,
      starfield: null
    };
    _canvasState[canvasId] = cState;

    // Load figure
    loadVesselFigure(gender, function(src) { cState.figImg = src; });

    // Init starfield
    cState.starfield = [];
    for (var i = 0; i < 60; i++) {
      cState.starfield.push({
        x: Math.random(), y: Math.random(),
        sz: 0.5 + Math.random() * 1.5,
        sp: 0.0003 + Math.random() * 0.0008,
        ph: Math.random() * 6.28,
        bright: 0.2 + Math.random() * 0.4
      });
    }

    var figColor = gender === 'female' ? [200, 104, 144] : [200, 169, 106];
    var colorStr = 'rgba(' + figColor[0] + ',' + figColor[1] + ',' + figColor[2] + ',';

    function draw() {
      cState.t += 0.016;
      var t = cState.t;

      // Clear
      ctx.clearRect(0, 0, W, H);

      // 1. Void background
      ctx.fillStyle = '#060608';
      ctx.fillRect(0, 0, W, H);

      // 2. Subtle center halo
      ctx.save();
      var haloGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, baseR + 60);
      haloGrad.addColorStop(0, colorStr + '0.04)');
      haloGrad.addColorStop(1, 'rgba(6,6,8,0)');
      ctx.fillStyle = haloGrad;
      ctx.fillRect(0, 0, W, H);
      ctx.restore();

      // 3. Mountains
      drawMountains(ctx, W, H, 0.3);

      // 4. Starfield
      drawStarfield(ctx, W, H, t, cState.starfield, colorStr);

      // 5. Qi Veins
      drawQiVeins(ctx, cx, cy, baseR, t, colorStr + '0.4)', 0.2);

      // 6. Gold Rune Seal (behind figure)
      drawRuneSeal(ctx, cx, cy, baseR, t, colorStr);

      // 7. Figure
      if (cState.figImg) {
        var figH = baseR * 1.6;
        var figW = figH;
        var floatY = Math.sin(t * 0.8) * 4;
        var figX = cx - figW * 0.5;
        var figY = cy - figH * 0.52 + floatY;

        ctx.save();
        ctx.globalAlpha = cState.isSelf ? 0.95 : 0.7;
        ctx.drawImage(cState.figImg, figX, figY, figW, figH);
        ctx.restore();
      }

      // 8. Aura ring
      var currentBook = getCurrentBook();
      var pct = 0;
      if (currentBook) {
        var sub = cState.isSelf ? currentBook.self : currentBook.partner;
        if (sub) pct = safeNumber(sub.progress_percent, 0) / 100;
      }
      if (pct > 0) {
        drawAuraRing(ctx, cx, cy, baseR, pct, colorStr, t);
      }

      _canvasState[canvasId].rafId = requestAnimationFrame(draw);
    }

    draw();
  }

  // ── AMBIENT: MOUNTAINS ──
  function drawMountains(ctx, W, H, alpha) {
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#1a1a28';
    ctx.beginPath();
    ctx.moveTo(0, H);
    ctx.lineTo(0, H * 0.88);
    ctx.lineTo(W * 0.08, H * 0.82);
    ctx.lineTo(W * 0.15, H * 0.86);
    ctx.lineTo(W * 0.25, H * 0.78);
    ctx.lineTo(W * 0.35, H * 0.84);
    ctx.lineTo(W * 0.45, H * 0.76);
    ctx.lineTo(W * 0.55, H * 0.80);
    ctx.lineTo(W * 0.65, H * 0.74);
    ctx.lineTo(W * 0.75, H * 0.82);
    ctx.lineTo(W * 0.85, H * 0.79);
    ctx.lineTo(W * 0.92, H * 0.85);
    ctx.lineTo(W, H * 0.88);
    ctx.lineTo(W, H);
    ctx.closePath();
    ctx.fill();

    // Mist
    var mist = ctx.createLinearGradient(0, H * 0.85, 0, H);
    mist.addColorStop(0, 'rgba(14,14,20,0)');
    mist.addColorStop(1, 'rgba(26,26,40,' + (alpha * 0.5) + ')');
    ctx.globalAlpha = 1;
    ctx.fillStyle = mist;
    ctx.fillRect(0, H * 0.85, W, H * 0.15);
    ctx.restore();
  }

  // ── AMBIENT: STARFIELD ──
  function drawStarfield(ctx, W, H, t, stars, colorStr) {
    ctx.save();
    for (var i = 0; i < stars.length; i++) {
      var s = stars[i];
      s.y -= s.sp;
      if (s.y < -0.02) { s.y = 1.02; s.x = Math.random(); }
      var flicker = 0.6 + Math.sin(t * 1.5 + s.ph) * 0.4;
      ctx.globalAlpha = s.bright * flicker;
      ctx.fillStyle = colorStr + '0.8)';
      ctx.beginPath();
      ctx.arc(s.x * W, s.y * H, s.sz, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  // ── AMBIENT: QI VEINS ──
  function drawQiVeins(ctx, cx, cy, baseR, t, color, alpha) {
    ctx.save();
    var veinCount = 6;
    var pulse = 0.5 + Math.sin(t * 0.8) * 0.3;
    ctx.globalAlpha = alpha * pulse;
    ctx.strokeStyle = color;
    ctx.lineWidth = 1.2;
    for (var v = 0; v < veinCount; v++) {
      var angle = (v / veinCount) * Math.PI * 2 + t * 0.02;
      ctx.beginPath();
      var px = cx, py = cy;
      ctx.moveTo(px, py);
      var segments = 5;
      var segLen = baseR * 0.22;
      for (var s = 0; s < segments; s++) {
        var drift = Math.sin(t * 0.5 + v + s * 2) * 0.3;
        px += Math.cos(angle + drift) * segLen;
        py += Math.sin(angle + drift) * segLen;
        ctx.lineTo(px, py);
      }
      ctx.stroke();
    }
    ctx.restore();
  }

  // ── GOLD RUNE SEAL (behind figure) ──
  function drawRuneSeal(ctx, cx, cy, baseR, t, colorStr) {
    ctx.save();
    ctx.globalAlpha = 0.10;
    ctx.strokeStyle = colorStr + '0.6)';
    ctx.lineWidth = 1.2;

    // Outer ring
    ctx.beginPath();
    ctx.arc(cx, cy, baseR * 1.05, 0, Math.PI * 2);
    ctx.stroke();

    // Inner ring
    ctx.beginPath();
    ctx.arc(cx, cy, baseR * 0.65, 0, Math.PI * 2);
    ctx.stroke();

    // Rotating rune glyphs
    var runes = ['\u2727','\u2726','\u2734','\u2735','\u2721','\u2742','\u2720','\u273A','\u2736','\u2737','\u2738','\u2739'];
    ctx.font = '10px serif';
    ctx.fillStyle = colorStr + '0.5)';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    var phase = t * 0.3;
    for (var i = 0; i < 12; i++) {
      var a = (i / 12) * Math.PI * 2 + phase;
      var rx = cx + Math.cos(a) * baseR * 0.85;
      var ry = cy + Math.sin(a) * baseR * 0.85;
      ctx.globalAlpha = 0.08 + Math.sin(t + i) * 0.03;
      ctx.fillText(runes[i], rx, ry);
    }

    // Cross lines
    ctx.globalAlpha = 0.06;
    ctx.strokeStyle = colorStr + '0.4)';
    for (var j = 0; j < 4; j++) {
      var la = (j / 4) * Math.PI * 2 + t * -0.15;
      ctx.beginPath();
      ctx.moveTo(cx + Math.cos(la) * baseR * 0.65, cy + Math.sin(la) * baseR * 0.65);
      ctx.lineTo(cx + Math.cos(la) * baseR * 1.05, cy + Math.sin(la) * baseR * 1.05);
      ctx.stroke();
    }

    ctx.restore();
  }

  // ── AURA RING ──
  function drawAuraRing(ctx, cx, cy, baseR, pct, colorStr, t) {
    if (pct <= 0) return;
    var start = -Math.PI / 2;
    var end = start + Math.PI * 2 * pct;

    // Wide glow
    ctx.save();
    ctx.beginPath();
    ctx.arc(cx, cy, baseR, start, end);
    ctx.strokeStyle = colorStr + '0.3)';
    ctx.lineWidth = 18;
    ctx.globalAlpha = 0.15 + Math.sin(t * 1.2) * 0.05;
    ctx.lineCap = 'round';
    ctx.stroke();
    ctx.restore();

    // Core line
    ctx.save();
    ctx.beginPath();
    ctx.arc(cx, cy, baseR, start, end);
    ctx.strokeStyle = colorStr + '0.9)';
    ctx.lineWidth = 3;
    ctx.globalAlpha = 0.85;
    ctx.lineCap = 'round';
    ctx.stroke();
    ctx.restore();

    // Tip glow
    var tipX = cx + Math.cos(end) * baseR;
    var tipY = cy + Math.sin(end) * baseR;
    ctx.save();
    ctx.beginPath();
    ctx.arc(tipX, tipY, 4, 0, Math.PI * 2);
    ctx.fillStyle = '#ffffff';
    ctx.globalAlpha = 0.9;
    ctx.fill();
    ctx.restore();
  }

  // ── FIGURE LOADING ──
  var _figLoading = {};
  var _figCallbacks = { male: [], female: [] };

  function loadVesselFigure(gender, callback) {
    if (state.figureCache[gender]) { callback(state.figureCache[gender]); return; }
    _figCallbacks[gender] = _figCallbacks[gender] || [];
    _figCallbacks[gender].push(callback);
    if (_figLoading[gender]) return;
    _figLoading[gender] = true;

    var url = (gender === 'female') ? '/images/female-figure.svg' : '/images/figure.svg';
    var img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = function() {
      try {
        var off = document.createElement('canvas');
        off.width = 1024; off.height = 1024;
        var ctx2 = off.getContext('2d');
        ctx2.drawImage(img, 0, 0);
        var id = ctx2.getImageData(0, 0, 1024, 1024);
        var d = id.data;
        var rgb = (gender === 'female') ? [200, 104, 144] : [200, 169, 106];
        for (var i = 0; i < d.length; i += 4) {
          if (d[i+3] > 10 && d[i] < 80 && d[i+1] < 80 && d[i+2] < 80) {
            d[i] = rgb[0]; d[i+1] = rgb[1]; d[i+2] = rgb[2];
          } else {
            d[i+3] = 0;
          }
        }
        ctx2.putImageData(id, 0, 0);
        state.figureCache[gender] = off;
      } catch(e) { state.figureCache[gender] = null; }
      _figLoading[gender] = false;
      var cbs = (_figCallbacks[gender] || []).slice();
      _figCallbacks[gender] = [];
      for (var j = 0; j < cbs.length; j++) { cbs[j](state.figureCache[gender]); }
    };
    img.onerror = function() {
      state.figureCache[gender] = null;
      _figLoading[gender] = false;
      var cbs = (_figCallbacks[gender] || []).slice();
      _figCallbacks[gender] = [];
      for (var j = 0; j < cbs.length; j++) { cbs[j](null); }
    };
    img.src = url;
  }

  // ── LOGOUT ──
  function setupLogout() {
    var link = document.getElementById('logout-link');
    if (link) {
      link.addEventListener('click', function(e) {
        e.preventDefault();
        clearClientSessionArtifacts();
        window.location.href = '/login.html';
      });
    }
  }

  // ── INIT ──
  function init() {
    var params = getUrlParams();
    if (params.volume) state.requestedVolumeNumber = safeNumber(params.volume);
    if (params.partnership_uuid) state.requestedPartnershipUuid = safeText(params.partnership_uuid);
    if (params.partnership_id) state.requestedLegacyPartnershipId = safeText(params.partnership_id);

    setupLogout();

    loadViewerSession().then(function() {
      if (!state.member) return;
      return loadBookState();
    });
  }

  document.addEventListener('DOMContentLoaded', init);
</script>
