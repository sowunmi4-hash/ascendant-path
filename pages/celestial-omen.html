<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Celestial Omens — Ascendant Path</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#07070b;--card:#0c0c17;--card2:rgba(12,12,22,0.6);
      --border:rgba(200,169,106,0.10);--border2:rgba(200,169,106,0.18);
      --gold:#c8a96a;--text:#e8e0d0;--text2:rgba(232,224,208,0.52);--text3:rgba(232,224,208,0.26);
      --fh:'Cinzel',serif;--fb:'Cormorant Garamond',serif;
      --fc:#c8a96a;--fg:rgba(200,169,106,0.15);
    }
    html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--fb)}

    /* ── ANIMATIONS ── */
    @keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
    @keyframes pulseRing{0%,100%{box-shadow:0 0 0 0 rgba(200,169,106,0)}50%{box-shadow:0 0 0 5px rgba(200,169,106,0.12)}}
    @keyframes rowIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── NAV ── */
    .site-shell{width:min(1280px,calc(100% - 2rem));margin:0 auto;position:relative;z-index:2}
    .site-header{padding-top:1rem;position:relative;z-index:20}
    .dashboard-nav{
      width:fit-content;max-width:100%;margin:0 auto;
      display:flex;align-items:center;justify-content:center;
      gap:.55rem;flex-wrap:wrap;padding:.75rem .9rem;border-radius:999px;
      background:linear-gradient(180deg,rgba(255,255,255,0.03),rgba(255,255,255,0.01)),rgba(6,10,18,0.74);
      border:1px solid rgba(255,255,255,0.06);box-shadow:0 14px 34px rgba(0,0,0,0.22);
      backdrop-filter:blur(10px);font-family:var(--fh);font-size:.84rem;
    }
    .dashboard-nav a,.btn-rf{
      padding:.62rem .92rem;border-radius:999px;
      border:1px solid rgba(255,255,255,0.04);background:rgba(255,255,255,0.02);
      color:rgba(221,213,200,0.7);text-decoration:none;transition:.18s ease;
    }
    .dashboard-nav a:hover,.btn-rf:hover{transform:translateY(-1px);color:#ddd5c8;border-color:rgba(142,168,255,0.22);background:rgba(255,255,255,0.04)}
    .dashboard-nav a.active{color:#fff;border-color:rgba(142,168,255,0.28);background:rgba(142,168,255,0.10)}
    .btn-rf{background:none;cursor:pointer;font-family:var(--fh);font-size:.84rem}

    /* ── STATES ── */
    .state{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;
      align-items:center;justify-content:center;background:var(--bg);
      gap:14px;font-family:var(--fh);font-size:11px;letter-spacing:.12em;color:var(--text3)}
    .state.off{display:none}
    .spin{width:32px;height:32px;border-radius:50%;border:1.5px solid rgba(200,169,106,.1);border-top-color:var(--fc);animation:spin 1.1s linear infinite}

    /* ── PAGE ── */
    .pg{display:none}
    .pg.on{display:block}
    .wrap{max-width:1100px;width:100%;margin:0 auto;padding:36px 32px 80px}
    @media(max-width:680px){.wrap{padding:24px 16px 60px}}

    /* ── BANNER ── */
    .banner{
      position:relative;overflow:hidden;
      background:var(--card);border:1px solid var(--border);border-radius:6px;
      padding:28px 32px 24px;margin-bottom:28px;
      animation:fadeUp .5s ease both;
    }
    .banner::before{
      content:'';position:absolute;top:0;left:0;right:0;height:1.5px;
      background:linear-gradient(90deg,transparent,var(--fc),transparent);
      background-size:200% auto;animation:shimmer 4s linear infinite;
    }
    .banner-row{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:6px}
    .banner-date{font-family:var(--fh);font-size:10px;letter-spacing:.2em;color:var(--text3);text-transform:uppercase;margin-bottom:10px}
    .banner-advisory{font-family:var(--fh);font-size:20px;font-weight:600;color:var(--fc);letter-spacing:.04em;line-height:1.35}
    .banner-sub{font-family:var(--fb);font-size:16px;font-style:italic;color:var(--text2);margin-top:8px}
    .reading-pill{
      flex-shrink:0;font-family:var(--fh);font-size:9px;letter-spacing:.14em;
      text-transform:uppercase;padding:5px 14px;border-radius:999px;margin-top:2px;
      border:1px solid rgba(85,187,102,0.35);background:rgba(85,187,102,0.08);color:#55bb66;
    }
    .reading-pill.uncertain{border-color:rgba(200,169,106,0.35);background:rgba(200,169,106,0.08);color:var(--fc)}

    /* ── SECTION HEADER ── */
    .sec-head{display:flex;align-items:center;gap:14px;margin:0 0 16px}
    .sec-line{flex:1;height:1px;background:var(--border)}
    .sec-label{font-family:var(--fh);font-size:9px;letter-spacing:.22em;color:var(--text3);text-transform:uppercase;white-space:nowrap}

    /* ── TODAY PHASES ── */
    .phases{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:10px;margin-bottom:32px}
    @media(max-width:680px){.phases{grid-template-columns:repeat(3,minmax(0,1fr))}}
    @media(max-width:400px){.phases{grid-template-columns:repeat(2,minmax(0,1fr))}}

    .phase{
      background:var(--card);border:1px solid var(--border);border-radius:5px;
      padding:14px 10px 12px;text-align:center;
      transition:transform .15s,border-color .2s;cursor:default;
    }
    .phase:hover{transform:translateY(-3px);border-color:var(--border2)}
    .phase.active{
      border-color:rgba(200,169,106,0.45);
      background:rgba(200,169,106,0.05);
      animation:pulseRing 2.8s ease-in-out infinite;
    }
    .phase-icon{font-size:20px;margin-bottom:6px;display:block}
    .phase-name{font-family:var(--fh);font-size:9px;letter-spacing:.1em;text-transform:uppercase;
      color:var(--text3);line-height:1.4;margin-bottom:8px}
    .phase.active .phase-name{color:rgba(200,169,106,0.7)}
    .phase-force{font-family:var(--fb);font-size:14px;font-weight:500;color:var(--text);line-height:1.3}
    .phase.active .phase-force{color:var(--fc)}
    .phase-now{font-family:var(--fh);font-size:8px;letter-spacing:.12em;text-transform:uppercase;
      color:var(--fc);margin-top:5px;opacity:.8}

    /* ── FORECAST TABLE ── */
    .tbl-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:5px}
    .tbl{width:100%;border-collapse:collapse;font-size:12px;min-width:680px}
    .tbl thead tr{background:rgba(200,169,106,0.04)}
    .tbl th{
      font-family:var(--fh);font-size:9px;letter-spacing:.12em;text-transform:uppercase;
      color:var(--text3);padding:12px 10px;text-align:left;
      border-bottom:1px solid var(--border);white-space:nowrap;
    }
    .tbl td{padding:10px;border-bottom:1px solid rgba(200,169,106,0.06);vertical-align:top}
    .tbl tr:last-child td{border-bottom:none}
    .tbl tbody tr{transition:background .15s}
    .tbl tbody tr:hover td{background:rgba(200,169,106,0.03)}
    .tbl tbody tr.today td{background:rgba(200,169,106,0.04)}
    .tbl tbody tr.faded{opacity:.5}
    .tbl tbody tr.very-faded{opacity:.25}

    .day-label{font-family:var(--fh);font-size:11px;font-weight:600;color:var(--text);white-space:nowrap}
    .day-date{font-family:var(--fh);font-size:9px;letter-spacing:.08em;color:var(--text3);margin-top:2px}
    .live-dot{
      display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--fc);
      margin-left:5px;vertical-align:middle;animation:pulseRing 2s ease-in-out infinite;
    }
    .force-main{font-family:var(--fb);font-size:13px;color:var(--text);line-height:1.3}
    .force-shadow{font-family:var(--fb);font-size:11px;color:var(--text3);text-decoration:line-through;margin-top:2px;font-style:italic}
    .adv-text{font-family:var(--fb);font-size:12px;font-style:italic;color:var(--text2);line-height:1.5;max-width:130px}
    .obscured{font-family:var(--fb);font-size:12px;font-style:italic;color:var(--text3);padding:4px 0}
  </style>
</head>
<body>

<div class="site-shell">
  <header class="site-header">
    <nav class="dashboard-nav" aria-label="Global">
      <a href="/index.html">Home</a>
      <a href="/lore.html">Lore</a>
      <a href="/dashboard.html">Dashboard</a>
      <a href="/oracle.html">Ascendant Oracle</a>
      <a href="/breath-of-celestial.html">Celestial</a>
      <a href="/celestial-omen.html" class="active">Omens</a>
      <button class="btn-rf" id="btnRf">&#8635; Refresh</button>
      <a href="/.netlify/functions/logout" id="btnOut">Logout</a>
    </nav>
  </header>
</div>

<div class="state" id="stLoad"><div class="spin"></div><span>Consulting the omens&hellip;</span></div>
<div class="state off" id="stErr"><span id="errTxt">Unable to read the omens.</span></div>

<div class="pg" id="pgMain">
  <div class="wrap">

    <!-- Banner -->
    <div class="banner" id="elBanner">
      <div class="banner-date" id="tDate">— Celestial Date</div>
      <div class="banner-row">
        <div class="banner-advisory" id="tAdvisory">—</div>
        <div class="reading-pill" id="tPill">—</div>
      </div>
      <div class="banner-sub" id="tSub">—</div>
    </div>

    <!-- Today phases -->
    <div class="sec-head" style="animation:fadeIn .4s ease .3s both;opacity:0;animation-fill-mode:both">
      <div class="sec-line"></div>
      <div class="sec-label">Today's phases</div>
      <div class="sec-line"></div>
    </div>

    <div class="phases" id="elPhases"></div>

    <!-- Forecast -->
    <div class="sec-head" style="animation:fadeIn .4s ease .85s both;opacity:0;animation-fill-mode:both">
      <div class="sec-line"></div>
      <div class="sec-label">7-day forecast</div>
      <div class="sec-line"></div>
    </div>

    <div class="tbl-wrap" style="animation:fadeUp .5s ease .9s both;opacity:0;animation-fill-mode:both">
      <table class="tbl">
        <thead>
          <tr>
            <th>Day</th>
            <th>&#127765; Moon Grave</th>
            <th>&#127748; First Breath</th>
            <th>&#9728;&#65039; Golden Meridian</th>
            <th>&#127774; Zenith</th>
            <th>&#127747; Ashen Descent</th>
            <th>&#127761; Night Tide</th>
            <th>Reading</th>
          </tr>
        </thead>
        <tbody id="elRows"></tbody>
      </table>
    </div>

  </div>
</div>

<script>
(function(){
  "use strict";
  var VERIFY="/.netlify/functions/verify-session";
  var LOGOUT="/.netlify/functions/logout";
  var FORECAST="/.netlify/functions/load-seven-day-celestial-forecast";
  var CELESTIAL="/.netlify/functions/load-world-celestial-state";
  var LOGIN="/login.html";

  var _ri=null,_fly=false;

  var PHASE_ORDER=["moon_grave_silence","veil_of_first_breath","golden_meridian","zenith_of_heaven","ashen_descent","night_tide_omen"];
  var PHASE_ICONS={"moon_grave_silence":"🌕","veil_of_first_breath":"🌅","golden_meridian":"☀️","zenith_of_heaven":"🌞","ashen_descent":"🌇","night_tide_omen":"🌙"};
  var PHASE_LABELS={"moon_grave_silence":"Moon Grave Silence","veil_of_first_breath":"Veil of First Breath","golden_meridian":"Golden Meridian","zenith_of_heaven":"Zenith of Heaven","ashen_descent":"Ashen Descent","night_tide_omen":"Night Tide Omen"};

  function st(v,fb){fb=fb||"—";return String(v==null?"":v).trim()||fb}
  function nk(v){return String(v==null?"":v).trim().toLowerCase().replace(/[^a-z0-9]+/g,"_").replace(/^_+|_+$/g,"")}
  function g(id){return document.getElementById(id)}
  function tx(id,v){var e=g(id);if(e)e.textContent=st(v)}
  function show(id){var e=g(id);if(e)e.classList.remove("off")}
  function hide(id){var e=g(id);if(e)e.classList.add("off")}
  function on(id){var e=g(id);if(e)e.classList.add("on")}
  function off(id){var e=g(id);if(e)e.classList.remove("on")}

  function clearArt(){
    ["session","sessionToken","session_token","websiteSession","website_session",
     "member","memberState","member_state","user","user_state"].forEach(function(k){
      try{localStorage.removeItem(k)}catch(e){}
      try{sessionStorage.removeItem(k)}catch(e){}
    });
  }
  function goLogin(){clearArt();window.location.href=LOGIN}

  function requireAuth(cb){
    fetch(VERIFY,{method:"GET",credentials:"include",headers:{Accept:"application/json"}})
      .then(function(r){
        if(r.status===401||r.status===403){goLogin();return null}
        return r.json()
      })
      .then(function(d){if(!d)return;if(!d.authenticated){goLogin();return}cb()})
      .catch(function(e){console.error("Auth",e);goLogin()})
  }

  function doFetch(url,cb){
    fetch(url,{method:"GET",credentials:"include",headers:{Accept:"application/json"},cache:"no-store"})
      .then(function(r){
        if(r.status===401||r.status===403){goLogin();return null}
        return r.json().then(function(d){return{ok:r.ok,status:r.status,data:d}})
      })
      .then(function(res){if(res)cb(null,res)})
      .catch(function(e){cb(e,null)})
  }

  /* ── Build today phase cards ── */
  function buildPhases(todayDay, currentPhaseKey){
    var wrap=g("elPhases");
    if(!wrap)return;
    wrap.innerHTML="";
    var phases=todayDay.phases||{};
    PHASE_ORDER.forEach(function(pk,idx){
      var info=phases[pk]||{};
      var force=st(info.projected_force,"—");
      var isActive=(nk(currentPhaseKey)===pk);
      var div=document.createElement("div");
      div.className="phase"+(isActive?" active":"");
      div.style.animation="fadeUp .4s ease "+(0.35+idx*0.07)+"s both";
      div.style.opacity="0";
      div.style.animationFillMode="both";
      div.innerHTML=
        '<span class="phase-icon">'+st(PHASE_ICONS[pk],"·")+'</span>'+
        '<div class="phase-name">'+st(PHASE_LABELS[pk])+'</div>'+
        '<div class="phase-force">'+force+'</div>'+
        (isActive?'<div class="phase-now">Now</div>':'');
      wrap.appendChild(div);
    });
  }

  /* ── Build forecast rows ── */
  function buildRows(days, currentPhaseKey){
    var tbody=g("elRows");
    if(!tbody)return;
    tbody.innerHTML="";
    var uncertain=(days.length>2);

    days.forEach(function(day,di){
      var isFirm=(di<2);
      var isToday=(di===0);
      var isVeryFar=(di>=4);

      var tr=document.createElement("tr");
      if(isToday)tr.className="today";
      else if(isVeryFar)tr.className="very-faded";
      else if(!isFirm)tr.className="faded";
      tr.style.animation="rowIn .35s ease "+(0.95+di*0.1)+"s both";
      tr.style.opacity="0";
      tr.style.animationFillMode="both";

      /* Day cell */
      var dayLabel=st(day.forecast_day_label,"Day "+(di+1));
      var dayDate=st(day.celestial_date_text,"—");
      var liveDot=isToday?'<span class="live-dot"></span>':'';
      var td0='<td><div class="day-label">'+dayLabel+liveDot+'</div><div class="day-date">'+dayDate+'</div></td>';

      /* Phase cells */
      var phaseCells="";
      if(isVeryFar){
        phaseCells='<td colspan="6" class="obscured">Distant heavens obscured — reading unreliable</td>';
      } else {
        var phases=day.phases||{};
        PHASE_ORDER.forEach(function(pk){
          var info=phases[pk]||{};
          var main=st(info.projected_force,"—");
          var shadow=st(info.shadow_force,"");
          var shadowHtml=shadow?'<div class="force-shadow">'+shadow+'</div>':'';
          phaseCells+='<td><div class="force-main">'+main+'</div>'+shadowHtml+'</td>';
        });
      }

      /* Advisory cell */
      var advText=isFirm?"Firm reading":st(day.day_reading_type,"Uncertain");
      var advCell='<td class="adv-text">'+advText+'</td>';

      tr.innerHTML=td0+phaseCells+advCell;
      tbody.appendChild(tr);
    });
  }

  /* ── Render ── */
  function render(world, forecast){
    /* Banner from world */
    var todayForecast=forecast.days[0]||{};
    var advisory=st(todayForecast.day_advisory,"The heavens hold their shape.");
    var dateText=st(todayForecast.celestial_date_text,"—");
    var readingType=st(todayForecast.day_reading_type,"Firm reading");
    var isFirm=(nk(readingType).indexOf("firm")>=0||nk(readingType).indexOf("clear")>=0);

    tx("tDate",dateText+" · Today's Reading");
    tx("tAdvisory",advisory);
    tx("tSub","Phase · "+st(world.phase_name,"—")+" · Bias: "+dbias(world.effective_bias||world.phase_bias));

    var pill=g("tPill");
    if(pill){
      pill.textContent=readingType;
      pill.className="reading-pill"+(isFirm?"":" uncertain");
    }

    var currentPhaseKey=nk(world.phase_key||world.phase_name||"");
    buildPhases(todayForecast, currentPhaseKey);
    buildRows(forecast.days, currentPhaseKey);
  }

  function dbias(v){
    var k=nk(v);
    if(k==="yin")return"Yin";if(k==="yang")return"Yang";
    if(k==="balance"||k==="balanced"||k==="taiji")return"Taiji";
    return st(v,"Balanced");
  }

  /* ── Load both endpoints in parallel ── */
  function loadAll(silent){
    if(!silent){show("stLoad");hide("stErr");off("pgMain")}
    var worldData=null,forecastData=null,errors=0,done=0;

    function tryRender(){
      done++;
      if(done<2)return;
      if(errors>=2){
        if(!silent){hide("stLoad");tx("errTxt","Unable to load the omens.");show("stErr")}
        return;
      }
      if(!worldData||!forecastData){
        if(!silent){hide("stLoad");tx("errTxt","Incomplete data from the heavens.");show("stErr")}
        return;
      }
      render(worldData,forecastData);
      if(!silent){hide("stLoad");on("pgMain")}
    }

    doFetch(CELESTIAL,function(err,res){
      if(err||!res||!res.ok||!res.data||!res.data.world){errors++}
      else{worldData=res.data.world}
      tryRender();
    });

    doFetch(FORECAST,function(err,res){
      if(err||!res||!res.ok||!res.data||!res.data.forecast){errors++}
      else{forecastData=res.data.forecast}
      tryRender();
    });
  }

  function startRefresh(){
    if(_ri)clearInterval(_ri);
    _ri=setInterval(function(){
      if(_fly)return;_fly=true;
      loadAll(true);
      setTimeout(function(){_fly=false},5000);
    },60000);
  }

  function boot(){
    requireAuth(function(){
      loadAll(false);
      startRefresh();
    });
  }

  g("btnRf").addEventListener("click",function(){loadAll(false)});
  g("btnOut").addEventListener("click",function(e){e.preventDefault();clearArt();window.location.href=LOGOUT});
  document.addEventListener("DOMContentLoaded",boot);
  window.addEventListener("beforeunload",function(){if(_ri)clearInterval(_ri)});
})();
</script>
</body>
</html>
