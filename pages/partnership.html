<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hall of Bonds | The Ascendant Path</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body { margin: 0; background: #07070b; color: #ddd5c8; }
    a { color: inherit; text-decoration: none; }
    button, input, select { font: inherit; }
    .is-hidden { display: none !important; }

    .site-shell { width: min(1280px, calc(100% - 2rem)); margin: 0 auto; position: relative; z-index: 2; }
    .site-header { padding-top: 1rem; position: relative; z-index: 10; }

    .dashboard-nav {
      width: fit-content; max-width: 100%; margin: 0 auto;
      display: flex; align-items: center; justify-content: center;
      gap: 0.55rem; flex-wrap: wrap; padding: 0.75rem 0.9rem; border-radius: 999px;
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01)), rgba(6,10,18,0.74);
      border: 1px solid rgba(255,255,255,0.06); box-shadow: 0 14px 34px rgba(0,0,0,0.22); backdrop-filter: blur(10px);
    }
    .dashboard-nav a { padding: 0.62rem 0.92rem; border-radius: 999px; border: 1px solid rgba(255,255,255,0.04); background: rgba(255,255,255,0.02); color: rgba(221,213,200,0.76); font-size: 0.84rem; transition: 0.18s ease; }
    .dashboard-nav a:hover { color: #ddd5c8; border-color: rgba(200,169,106,0.22); background: rgba(255,255,255,0.04); }
    .dashboard-nav a.active { color: #fff; border-color: rgba(200,169,106,0.28); background: rgba(200,169,106,0.10); }

    .hall-page { margin: 1.5rem auto 4rem; display: grid; gap: 1.5rem; }

    .hall-header { text-align: center; padding: 2rem 1rem 1rem; }
    .hall-eyebrow { font-size: 0.72rem; letter-spacing: 0.18em; text-transform: uppercase; color: #c8a96a; margin-bottom: 0.5rem; }
    .hall-title { margin: 0 0 0.5rem; font-size: clamp(2rem, 4vw, 3.2rem); line-height: 1; color: #fff; }
    .hall-subtitle { margin: 0 auto; font-size: 0.95rem; line-height: 1.6; color: rgba(221,213,200,0.6); max-width: 48ch; }

    .page-message { padding: 0.85rem 1rem; border-radius: 14px; border: 1px solid rgba(200,169,106,0.2); background: rgba(200,169,106,0.08); color: #ddd5c8; font-size: 0.88rem; line-height: 1.6; text-align: center; }

    .bonds-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1rem; }

    .bond-card {
      position: relative; overflow: hidden; border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.07);
      background: linear-gradient(160deg, rgba(13,13,24,0.95), rgba(8,8,16,0.98));
      box-shadow: 0 20px 50px rgba(0,0,0,0.3);
      cursor: pointer; transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .bond-card:hover { transform: translateY(-3px); border-color: rgba(200,169,106,0.22); box-shadow: 0 28px 60px rgba(0,0,0,0.36); }
    .bond-card.is-selected { border-color: rgba(200,169,106,0.35); box-shadow: 0 0 0 2px rgba(200,169,106,0.15), 0 20px 50px rgba(0,0,0,0.3); }
    .bond-card.is-pending { border-color: rgba(142,168,255,0.2); }
    .bond-card.is-historical { opacity: 0.6; }

    .bond-rank { position: absolute; top: 14px; left: 14px; width: 28px; height: 28px; border-radius: 50%; background: rgba(200,169,106,0.12); border: 1px solid rgba(200,169,106,0.25); display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 700; color: #c8a96a; }

    .bond-status-badge { position: absolute; top: 14px; right: 14px; padding: 0.28rem 0.65rem; border-radius: 999px; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; }
    .bond-status-badge.active { background: rgba(85,187,102,0.15); border: 1px solid rgba(85,187,102,0.3); color: #55bb66; }
    .bond-status-badge.pending { background: rgba(142,168,255,0.12); border: 1px solid rgba(142,168,255,0.25); color: #8ea8ff; }
    .bond-status-badge.historical { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: rgba(221,213,200,0.5); }

    .bond-figures { display: flex; align-items: flex-end; justify-content: center; gap: 0; padding: 2.2rem 1.5rem 0; min-height: 120px; }
    .bond-figure { display: flex; flex-direction: column; align-items: center; gap: 0.3rem; flex: 1; }

    .bond-figure-avatar {
      width: 52px; height: 52px; border-radius: 50%;
      border: 1.5px solid rgba(200,169,106,0.3);
      background: radial-gradient(circle at top, rgba(200,169,106,0.12), rgba(8,8,16,1));
      display: flex; align-items: center; justify-content: center;
      font-size: 1.05rem; font-weight: 700; color: #c8a96a; font-family: 'Cinzel', serif;
      position: relative;
    }
    .bond-figure-avatar.female { border-color: rgba(200,104,144,0.3); background: radial-gradient(circle at top, rgba(200,104,144,0.12), rgba(8,8,16,1)); color: #c86890; }
    .bond-figure-avatar::after { content: ''; position: absolute; bottom: 1px; right: 1px; width: 10px; height: 10px; border-radius: 50%; background: transparent; border: 1.5px solid transparent; }
    .bond-figure-avatar.is-online::after { background: #55bb66; border-color: #07070b; box-shadow: 0 0 6px rgba(85,187,102,0.6); }

    .bond-figure-name { font-size: 0.78rem; color: #ddd5c8; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 110px; }
    .bond-figure-realm { font-size: 0.62rem; color: rgba(221,213,200,0.45); text-align: center; text-transform: uppercase; letter-spacing: 0.08em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 110px; }

    .bond-connector { display: flex; flex-direction: column; align-items: center; gap: 0.2rem; padding-bottom: 0.5rem; flex-shrink: 0; width: 60px; }
    .bond-connector-line { width: 40px; height: 1px; background: linear-gradient(90deg, transparent, rgba(200,169,106,0.4), transparent); }
    .bond-connector-icon { font-size: 0.9rem; color: rgba(200,169,106,0.5); }

    .bond-body { padding: 1rem 1.25rem 1.25rem; display: grid; gap: 0.75rem; }

    .bond-stage-row { display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; }
    .bond-stage-name { font-size: 0.88rem; font-weight: 600; color: #fff; font-family: 'Cinzel', serif; letter-spacing: 0.04em; }
    .bond-percent { font-size: 0.78rem; color: #c8a96a; font-weight: 600; }

    .bond-bar-track { height: 3px; border-radius: 2px; background: rgba(255,255,255,0.06); overflow: hidden; }
    .bond-bar-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, #c8a96a, #ead7aa); transition: width 0.6s ease; }

    .bond-resonance-row { display: flex; align-items: center; gap: 0.5rem; }
    .bond-resonance-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .bond-resonance-dot.resonant { background: #55bb66; box-shadow: 0 0 6px rgba(85,187,102,0.7); }
    .bond-resonance-dot.nearby   { background: #c8a96a; box-shadow: 0 0 6px rgba(200,169,106,0.5); }
    .bond-resonance-dot.offline  { background: rgba(255,255,255,0.15); }
    .bond-resonance-label { font-size: 0.72rem; color: rgba(221,213,200,0.55); text-transform: uppercase; letter-spacing: 0.1em; }

    .bond-actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .bond-btn { flex: 1; min-height: 36px; border-radius: 10px; cursor: pointer; font-size: 0.78rem; font-weight: 600; letter-spacing: 0.04em; transition: 0.18s ease; border: 1px solid rgba(200,169,106,0.25); background: rgba(200,169,106,0.1); color: #c8a96a; }
    .bond-btn:hover { background: rgba(200,169,106,0.18); transform: translateY(-1px); }
    .bond-btn.is-danger { border-color: rgba(204,68,68,0.25); background: rgba(204,68,68,0.08); color: #cc4444; }
    .bond-btn.is-danger:hover { background: rgba(204,68,68,0.14); }
    .bond-btn.is-accept { border-color: rgba(85,187,102,0.3); background: rgba(85,187,102,0.1); color: #55bb66; }
    .bond-btn.is-accept:hover { background: rgba(85,187,102,0.18); }

    .request-panel { background: rgba(13,13,24,0.8); border: 1px solid rgba(255,255,255,0.07); border-radius: 24px; padding: 1.25rem 1.4rem; backdrop-filter: blur(8px); }
    .request-panel-title { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.14em; color: rgba(221,213,200,0.4); margin-bottom: 0.85rem; }
    .request-form { display: grid; gap: 0.65rem; }
    .request-fields { display: grid; grid-template-columns: 1fr 1fr auto auto; gap: 0.55rem; align-items: stretch; }
    .request-input { min-height: 42px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.04); color: #fff; padding: 0.6rem 0.85rem; outline: none; transition: 0.18s ease; font-size: 0.84rem; }
    .request-input::placeholder { color: rgba(221,213,200,0.3); }
    .request-input:focus { border-color: rgba(200,169,106,0.3); box-shadow: 0 0 0 3px rgba(200,169,106,0.07); }
    .request-btn { min-height: 42px; padding: 0 1rem; border-radius: 12px; cursor: pointer; font-size: 0.82rem; font-weight: 600; transition: 0.18s ease; }
    .request-btn.primary { border: 1px solid rgba(200,169,106,0.28); background: rgba(200,169,106,0.14); color: #fff; }
    .request-btn.primary:hover { background: rgba(200,169,106,0.22); }
    .request-btn.secondary { border: 1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.04); color: rgba(221,213,200,0.6); }
    .request-btn.secondary:hover { background: rgba(255,255,255,0.08); color: #ddd5c8; }
    .request-btn:disabled { opacity: 0.5; cursor: wait; }

    .hall-empty { text-align: center; padding: 3rem 1rem; border: 1px dashed rgba(255,255,255,0.08); border-radius: 24px; background: rgba(255,255,255,0.02); }
    .hall-empty-title { font-size: 1.1rem; color: #fff; margin: 0 0 0.4rem; }
    .hall-empty-copy { font-size: 0.88rem; color: rgba(221,213,200,0.5); margin: 0; }

    #news-ticker-bar { font-family: 'Cinzel', serif; }
    .ticker-item { display:inline-flex;align-items:center;padding:0 24px;font-size:11px;white-space:nowrap;gap:8px;border-right:1px solid rgba(200,169,106,0.12);font-family:'Cinzel',serif;letter-spacing:0.04em; }
    .ticker-item.celestial { color:#c8a96a; } .ticker-item.notice { color:rgba(221,213,200,0.8); } .ticker-item.notice-urgent { color:#c86890; }
    .ticker-dot { width:5px;height:5px;border-radius:50%;display:inline-block;flex-shrink:0; }
    .ticker-dot.celestial { background:#c8a96a; } .ticker-dot.notice { background:rgba(221,213,200,0.4); } .ticker-dot.notice-urgent { background:#c86890; }

    @media (max-width: 700px) {
      .request-fields { grid-template-columns: 1fr; }
      .bonds-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="cloud-layer"></div>
  <div class="rune-layer"></div>

  <div class="site-shell">
    <header class="site-header">
      <nav class="dashboard-nav" aria-label="Global">
        <a href="/index.html">Home</a>
        <a href="/lore.html">Lore</a>
        <a href="/dashboard.html">Dashboard</a>
        <a href="/partnership.html" class="active">Hall of Bonds</a>
        <a href="/.netlify/functions/logout" id="logout-button">Logout</a>
      </nav>
      <div id="news-ticker-bar" style="width:100%;background:#0d0d18;border-top:0.5px solid rgba(200,169,106,0.15);border-bottom:0.5px solid rgba(200,169,106,0.15);height:34px;display:flex;align-items:center;overflow:hidden;">
        <div id="ticker-label" style="flex-shrink:0;padding:0 14px;font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:#c8a96a;font-weight:600;border-right:0.5px solid rgba(200,169,106,0.25);height:100%;display:flex;align-items:center;background:#0d0d18;white-space:nowrap;font-family:'Cinzel',serif;">⬡ Celestial Feed</div>
        <div style="overflow:hidden;flex:1;position:relative;height:100%;"><div id="ticker-track" style="display:flex;align-items:center;height:100%;position:absolute;white-space:nowrap;"></div></div>
      </div>
    </header>

    <main class="hall-page">
      <div class="hall-header">
        <div class="hall-eyebrow">Cultivation Bonds</div>
        <h1 class="hall-title">Hall of Bonds</h1>
        <p class="hall-subtitle">The bonds forged on this path, honoured by time and shared cultivation.</p>
      </div>

      <div class="page-message is-hidden" id="page-message"></div>

      <div class="bonds-grid" id="bonds-grid">
        <div class="hall-empty">
          <div class="hall-empty-title">Loading bonds...</div>
          <p class="hall-empty-copy">One moment.</p>
        </div>
      </div>

      <div class="request-panel">
        <div class="request-panel-title">Send a Bond Request</div>
        <form class="request-form" id="partner-request-form">
          <div class="request-fields">
            <input type="text" class="request-input" id="partner-username" placeholder="SL Username" autocomplete="off" />
            <input type="text" class="request-input" id="partner-avatar-key" placeholder="Avatar UUID (optional)" autocomplete="off" />
            <button type="submit" class="request-btn primary" id="send-request-button">Send Request</button>
            <button type="button" class="request-btn secondary" id="clear-request-form">Clear</button>
          </div>
        </form>
      </div>
    </main>
  </div>

  <script>
    const LOGIN_URL = "https://ascendantpath.org/login.html";
    const CSRF_KEY  = "ap_csrf_token";
    const state = { payload: null, isSubmitting: false, refreshInterval: null };

    function safeText(v, fb="") { return String(v ?? "").trim() || fb; }
    function escapeHtml(v) { return safeText(v).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;"); }
    function getCsrf() { return sessionStorage.getItem(CSRF_KEY) || ""; }
    function setCsrf(t) { if (safeText(t)) sessionStorage.setItem(CSRF_KEY, t); }
    function clearArtifacts() { sessionStorage.removeItem(CSRF_KEY); localStorage.removeItem("session_token"); }
    function redirectLogin() { location.href = LOGIN_URL + "?next=" + encodeURIComponent(location.pathname+location.search+location.hash); }
    function showPageMessage(msg) { const el=document.getElementById("page-message"); el.textContent=msg; el.classList.remove("is-hidden"); }
    function clearPageMessage() { document.getElementById("page-message").classList.add("is-hidden"); }
    function setBusy(v) { state.isSubmitting = v; }
    function setButtonLoading(v) { const b=document.getElementById("send-request-button"); b.disabled=v; b.textContent=v?"Sending...":"Send Request"; }

    async function authFetch(url, opts={}) {
      const csrf = getCsrf();
      const r = await fetch(url, { credentials:"include", headers:{"Accept":"application/json",...(csrf?{"X-AP-CSRF-Token":csrf}:{}),...(opts.headers||{})}, ...opts });
      if (r.status === 401) { clearArtifacts(); redirectLogin(); throw new Error("session has expired"); }
      return r;
    }
    async function parseJson(r, fb) {
      const text = await r.text(); let d;
      try { d = text ? JSON.parse(text) : null; } catch { throw new Error(fb||"Invalid response"); }
      if (!r.ok) throw new Error(d?.message||d?.error||("Request failed ("+r.status+")"));
      return d;
    }
    async function verifySession() {
      const r = await fetch("/.netlify/functions/verify-session", { method:"GET", credentials:"include", headers:{Accept:"application/json"} });
      if (r.status === 401) { clearArtifacts(); redirectLogin(); return; }
      const d = await r.json();
      if (!d?.authenticated) { clearArtifacts(); redirectLogin(); return; }
      const tok = d.csrf_token||d.csrfToken||d.csrf||""; if (tok) setCsrf(tok);
    }
    async function logoutUser() {
      try { await authFetch("/.netlify/functions/logout", { method:"POST", headers:{"Content-Type":"application/json"}, body:"{}" }); } catch{}
      clearArtifacts(); location.href = LOGIN_URL;
    }

    function getUuid(item)     { return safeText(item?.partnership_uuid); }
    function getId(item)       { return item?.partnership_id ?? null; }
    function getStatus(item) {
      const s = safeText(item?.status,"").toLowerCase();
      if (s==="active"||s==="accepted") return "active";
      if (s==="pending") return item?.can_accept ? "pending_incoming" : "pending_outgoing";
      return "historical";
    }
    function getPartnerName(item) { return safeText(item?.summary?.partner_name)||safeText(item?.partner?.display_name)||safeText(item?.partner?.character_name)||safeText(item?.partner?.sl_username)||safeText(item?.counterpart?.sl_username)||"Unknown"; }
    function getMemberName(item)  { return safeText(item?.member?.display_name)||safeText(item?.member?.character_name)||safeText(item?.member?.sl_username)||"You"; }
    function getMemberRealm(item) { return safeText(item?.member?.realm_display_name); }
    function getPartnerRealm(item){ return safeText(item?.partner?.realm_display_name)||safeText(item?.partner_realm); }
    function getBondPct(item)     { return Number(item?.bond?.bond_percent??item?.summary?.bond_percent??0); }
    function getBondStage(item)   { return safeText(item?.bond?.current_stage_name)||safeText(item?.summary?.bond_stage_name)||"Bond Seed"; }
    function getSelectedUuid(p)   { return safeText(p?.selected_partnership_uuid)||safeText(p?.current_focus_partnership_uuid); }
    function getMemberGender(item){ return safeText(item?.member?.gender,"male").toLowerCase(); }
    function getPartnerGender(item){ return safeText(item?.partner?.gender,"male").toLowerCase(); }
    function initials(name) { const w=safeText(name).split(" ").filter(Boolean); if(!w.length)return"?"; return (w[0][0]+(w[1]?w[1][0]:"")).toUpperCase(); }
    function getAllItems(p) { return [...(p?.active_partnerships||p?.active||[]),...(p?.incoming_requests||p?.pending_incoming||[]),...(p?.outgoing_requests||p?.pending_outgoing||[]),...(p?.historical_partnerships||p?.historical||[])]; }
    function sortOldest(items) { return items.slice().sort((a,b)=>{ const aT=Date.parse(safeText(a?.accepted_at||a?.created_at,""))||Infinity; const bT=Date.parse(safeText(b?.accepted_at||b?.created_at,""))||Infinity; return aT-bT; }); }

    function getResonance(item) {
      if (item?.partner_presence_active) return "resonant";
      if (item?.partner_hud_recent)      return "nearby";
      return "offline";
    }
    function getResonanceLabel(item) {
      const s = getResonance(item);
      if (s==="resonant") return "Resonance Active";
      if (s==="nearby")   return "Partner Nearby";
      return "Resonance Offline";
    }

    function buildCard(item, rank, selectedUuid) {
      const uuid       = getUuid(item);
      const legacyId   = getId(item);
      const status     = getStatus(item);
      const isSelected = selectedUuid && uuid && selectedUuid === uuid;
      const pct        = getBondPct(item);
      const resonance  = getResonance(item);
      const cardClass  = status==="active" ? "" : status.includes("pending") ? "is-pending" : "is-historical";
      const badgeClass = status==="active" ? "active" : status.includes("pending") ? "pending" : "historical";
      const badgeLabel = status==="active" ? "Active" : status==="pending_incoming" ? "Incoming" : status==="pending_outgoing" ? "Pending" : "Archived";

      const actions = [
        `<button type="button" class="bond-btn" data-open-record="true" data-partnership-uuid="${escapeHtml(uuid)}" data-partnership-id="${escapeHtml(legacyId??"")}">Open Record</button>`
      ];
      if (status==="pending_incoming") {
        actions.push(`<button type="button" class="bond-btn is-accept" data-shrine-action="accept" data-partnership-uuid="${escapeHtml(uuid)}" data-partnership-id="${escapeHtml(legacyId??"")}">Accept</button>`);
        actions.push(`<button type="button" class="bond-btn is-danger" data-shrine-action="deny" data-partnership-uuid="${escapeHtml(uuid)}" data-partnership-id="${escapeHtml(legacyId??"")}">Deny</button>`);
      } else if (status==="pending_outgoing") {
        actions.push(`<button type="button" class="bond-btn is-danger" data-shrine-action="remove" data-partnership-uuid="${escapeHtml(uuid)}" data-partnership-id="${escapeHtml(legacyId??"")}">Cancel</button>`);
      } else if (status==="active") {
        actions.push(`<button type="button" class="bond-btn is-danger" data-shrine-action="remove" data-partnership-uuid="${escapeHtml(uuid)}" data-partnership-id="${escapeHtml(legacyId??"")}">Remove</button>`);
      }

      return `<article class="bond-card ${cardClass} ${isSelected?"is-selected":""}" data-select-record="true" data-partnership-uuid="${escapeHtml(uuid)}" data-partnership-id="${escapeHtml(legacyId??"")}">
        <div class="bond-rank">${rank}</div>
        <div class="bond-status-badge ${badgeClass}">${escapeHtml(badgeLabel)}</div>
        <div class="bond-figures">
          <div class="bond-figure">
            <div class="bond-figure-avatar ${getMemberGender(item)==="female"?"female":""}">${escapeHtml(initials(getMemberName(item)))}</div>
            <div class="bond-figure-name">${escapeHtml(getMemberName(item))}</div>
            <div class="bond-figure-realm">${escapeHtml(getMemberRealm(item))}</div>
          </div>
          <div class="bond-connector">
            <div class="bond-connector-line"></div>
            <div class="bond-connector-icon">⬡</div>
            <div class="bond-connector-line"></div>
          </div>
          <div class="bond-figure">
            <div class="bond-figure-avatar ${getPartnerGender(item)==="female"?"female":""} ${item?.partner_hud_recent?"is-online":""}">${escapeHtml(initials(getPartnerName(item)))}</div>
            <div class="bond-figure-name">${escapeHtml(getPartnerName(item))}</div>
            <div class="bond-figure-realm">${escapeHtml(getPartnerRealm(item))}</div>
          </div>
        </div>
        <div class="bond-body">
          <div class="bond-stage-row">
            <div class="bond-stage-name">${escapeHtml(getBondStage(item))}</div>
            <div class="bond-percent">${pct.toFixed(1)}%</div>
          </div>
          <div class="bond-bar-track"><div class="bond-bar-fill" style="width:${Math.min(100,pct)}%"></div></div>
          <div class="bond-resonance-row">
            <div class="bond-resonance-dot ${resonance}"></div>
            <div class="bond-resonance-label">${escapeHtml(getResonanceLabel(item))}</div>
          </div>
          <div class="bond-actions" onclick="event.stopPropagation()">${actions.join("")}</div>
        </div>
      </article>`;
    }

    function renderGrid(payload) {
      const grid = document.getElementById("bonds-grid");
      const sorted = sortOldest(getAllItems(payload));
      const selUuid = getSelectedUuid(payload);
      if (!sorted.length) {
        grid.innerHTML = `<div class="hall-empty"><div class="hall-empty-title">No bonds yet</div><p class="hall-empty-copy">Your bonds will appear here once you forge a partnership.</p></div>`;
        return;
      }
      grid.innerHTML = sorted.map((item, i) => buildCard(item, i+1, selUuid)).join("");
    }

    function renderAll(payload) { state.payload = payload; renderGrid(payload); }

    async function loadList() {
      const r = await authFetch("/.netlify/functions/load-partnership-list", { method:"GET" });
      const d = await parseJson(r, "Failed to load partnership list.");
      renderAll(d); return d;
    }
    async function setSelected(uuid, id) {
      const body = {}; if (uuid) body.partnership_uuid=uuid; if (id) body.partnership_id=id;
      const r = await authFetch("/.netlify/functions/set-selected-partnership", { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(body) });
      return parseJson(r, "Failed to select partnership.");
    }
    async function openRecord(uuid, id) {
      await setSelected(uuid, id);
      if (uuid) { location.href=`/partnership-record.html?partnership_uuid=${encodeURIComponent(uuid)}`; return; }
      if (id)   { location.href=`/partnership-record.html?partnership_id=${encodeURIComponent(id)}`; return; }
      location.href="/partnership-record.html";
    }
    async function sendRequest(event) {
      event.preventDefault(); if (state.isSubmitting) return;
      const username=safeText(document.getElementById("partner-username").value);
      const avatarKey=safeText(document.getElementById("partner-avatar-key").value);
      if (!username && !avatarKey) { showPageMessage("Enter a partner SL username or avatar UUID."); return; }
      try {
        setButtonLoading(true); setBusy(true);
        const r=await authFetch("/.netlify/functions/send-partner-request",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({partner_username:username,partner_avatar_key:avatarKey})});
        const d=await parseJson(r,"Failed to send request.");
        showPageMessage(d.message||"Partner request sent.");
        document.getElementById("partner-username").value="";
        document.getElementById("partner-avatar-key").value="";
        await loadList();
      } catch(e){ if(!/session has expired/i.test(e.message)) showPageMessage(e.message||"Failed to send request."); }
      finally { setButtonLoading(false); setBusy(false); }
    }

    function bindEvents() {
      document.getElementById("partner-request-form").addEventListener("submit", sendRequest);
      document.getElementById("clear-request-form").addEventListener("click", () => { document.getElementById("partner-username").value=""; document.getElementById("partner-avatar-key").value=""; });
      document.getElementById("logout-button").addEventListener("click", async (e) => { e.preventDefault(); await logoutUser(); });

      document.body.addEventListener("click", async (e) => {
        const openBtn = e.target.closest("[data-open-record='true']");
        if (openBtn) {
          const uuid=safeText(openBtn.dataset.partnershipUuid); const id=openBtn.dataset.partnershipId?Number(openBtn.dataset.partnershipId):null;
          try { setBusy(true); await openRecord(uuid,id); } catch(err){ if(!/session has expired/i.test(err.message)){ showPageMessage(err.message||"Failed to open record."); setBusy(false); } }
          return;
        }
        const actionBtn = e.target.closest("[data-shrine-action]");
        if (actionBtn) {
          const action=safeText(actionBtn.dataset.shrineAction); const uuid=safeText(actionBtn.dataset.partnershipUuid); const id=actionBtn.dataset.partnershipId?Number(actionBtn.dataset.partnershipId):null;
          try {
            setBusy(true);
            let d;
            if (action==="accept"){ d=await parseJson(await authFetch("/.netlify/functions/accept-partner-request",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({...(uuid?{partnership_uuid:uuid}:{}),...(id?{partnership_id:id}:{})})})); }
            if (action==="deny")  { d=await parseJson(await authFetch("/.netlify/functions/deny-partner-request",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({...(uuid?{partnership_uuid:uuid}:{}),...(id?{partnership_id:id}:{})})})); }
            if (action==="remove"){ d=await parseJson(await authFetch("/.netlify/functions/remove-partnership",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({...(uuid?{partnership_uuid:uuid}:{}),...(id?{partnership_id:id}:{})})})); }
            if (d) showPageMessage(d.message||"Done."); await loadList();
          } catch(err){ if(!/session has expired/i.test(err.message)) showPageMessage(err.message||"Action failed."); }
          finally { setBusy(false); }
          return;
        }
        const selectCard = e.target.closest("[data-select-record='true']");
        if (selectCard) {
          const uuid=safeText(selectCard.dataset.partnershipUuid); const id=selectCard.dataset.partnershipId?Number(selectCard.dataset.partnershipId):null;
          try { setBusy(true); await setSelected(uuid,id); await loadList(); } catch(err){ if(!/session has expired/i.test(err.message)) showPageMessage(err.message||"Failed to select."); } finally { setBusy(false); }
        }
      });
    }

    async function boot() {
      try {
        clearPageMessage(); bindEvents(); await verifySession(); await loadList();
        state.refreshInterval = setInterval(async () => { try { await loadList(); } catch(e){ console.error("Hall refresh:",e); } }, 7000);
      } catch(e){ if(!/session has expired/i.test(safeText(e.message))) showPageMessage(e.message||"Failed to load Hall of Bonds."); }
    }
    document.addEventListener("DOMContentLoaded", boot);
    window.addEventListener("beforeunload", () => { if(state.refreshInterval) clearInterval(state.refreshInterval); });
  </script>

  <script>
  (function(){
    var track=document.getElementById('ticker-track'); if(!track)return;
    var _running=false,pos=0;
    function startScroll(){if(_running)return;_running=true;function loop(){var half=track.scrollWidth/2;pos-=0.45;if(half>0&&Math.abs(pos)>=half)pos=0;track.style.transform='translateX('+pos+'px)';requestAnimationFrame(loop);}loop();}
    function setItems(items){if(!items.length)items=[{type:'celestial',text:'The celestial currents are still. Cultivate in peace.'}];var doubled=items.concat(items);track.innerHTML=doubled.map(function(i){return'<span class="ticker-item '+i.type+'"><span class="ticker-dot '+i.type+'"></span>'+i.text+'</span>';}).join('');startScroll();}
    async function loadTicker(){var items=[];try{var res=await fetch('/.netlify/functions/load-world-celestial-state',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}',credentials:'include'});var data=await res.json();var w=data.world||data;if(w.phase_name)items.push({type:'celestial',text:w.phase_name+(w.force_name?' · '+w.force_name:'')});if(w.phenomenon_name&&w.phenomenon_name!=='None')items.push({type:'celestial',text:'Phenomenon: '+w.phenomenon_name});if(w.dashboard_effect_label)items.push({type:'celestial',text:w.dashboard_effect_label});}catch(e){}try{var nr=await fetch('/.netlify/functions/notifications-list',{credentials:'include'});var nd=await nr.json();if(nd.success&&nd.notifications){nd.notifications.filter(function(n){return!n.is_read;}).slice(0,5).forEach(function(n){var urgent=n.type==='breakthrough_success'||n.type==='breakthrough_failure'||n.type==='scroll_complete';items.push({type:urgent?'notice-urgent':'notice',text:n.title+' — '+n.message});});var badge=document.getElementById('notif-badge');if(badge&&nd.unread_count>0){badge.textContent=nd.unread_count>99?'99+':nd.unread_count;badge.style.display='flex';}}}catch(e){}setItems(items);}
    loadTicker();setInterval(loadTicker,60000);
  })();
  </script>
