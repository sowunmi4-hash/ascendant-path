<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tribulation Chamber | The Ascendant Path</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    :root {
      --bg-1: #050810;
      --bg-2: #0a1020;
      --bg-3: #10182b;
      --panel-bg: linear-gradient(180deg, rgba(16, 23, 40, 0.86), rgba(8, 12, 22, 0.95));
      --panel-border: rgba(255,255,255,0.08);
      --panel-shadow: 0 22px 56px rgba(0,0,0,0.34);
      --text-main: #f5f7ff;
      --text-soft: rgba(231, 237, 255, 0.84);
      --text-dim: rgba(205, 216, 255, 0.56);
      --blue: #8ea8ff;
      --cyan: #90e6ff;
      --gold: #e6c67a;
      --amber: #ffc977;
      --green: #95e38a;
      --red: #ff9c9c;
      --violet: #c6a5ff;
      --orb-fill-a: rgba(132, 226, 255, 0.95);
      --orb-fill-b: rgba(111, 171, 255, 0.88);
      --orb-glow: rgba(142,176,255,0.28);
      --progress: 0;
    }

    * { box-sizing: border-box; }
    html, body { min-height: 100%; }

    body {
      margin: 0;
      color: var(--text-main);
      background:
        radial-gradient(circle at top, rgba(84, 104, 172, 0.18), transparent 28%),
        radial-gradient(circle at 80% 14%, rgba(151, 106, 209, 0.11), transparent 22%),
        linear-gradient(180deg, var(--bg-2), var(--bg-1) 56%, #04070d 100%);
      overflow-x: hidden;
      position: relative;
    }

    .storm-sky, .storm-mist, .storm-flash {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .storm-sky {
      background:
        radial-gradient(circle at 18% 15%, rgba(129, 156, 255, 0.08), transparent 24%),
        radial-gradient(circle at 82% 14%, rgba(143, 231, 255, 0.06), transparent 18%);
      animation: skyDrift 22s ease-in-out infinite alternate;
      opacity: 0.94;
    }

    .storm-mist::before,
    .storm-mist::after {
      content: "";
      position: absolute;
      inset: -8%;
      background:
        radial-gradient(circle at 20% 30%, rgba(255,255,255,0.04), transparent 18%),
        radial-gradient(circle at 65% 26%, rgba(190,216,255,0.04), transparent 18%),
        radial-gradient(circle at 52% 68%, rgba(128,160,255,0.05), transparent 22%);
      filter: blur(18px);
      mix-blend-mode: screen;
    }

    .storm-mist::before { animation: mistDriftA 18s linear infinite; opacity: 0.5; }
    .storm-mist::after { animation: mistDriftB 24s linear infinite; opacity: 0.42; }

    .storm-flash {
      background:
        radial-gradient(circle at 50% 18%, rgba(255,255,255,0.2), transparent 28%),
        radial-gradient(circle at 50% 36%, rgba(143,231,255,0.12), transparent 40%);
      opacity: 0;
      transition: opacity 140ms ease;
    }

    body.lightning-pulse .storm-flash { opacity: 0.92; }

    nav, main, footer { position: relative; z-index: 2; }

    nav {
      width: min(1240px, calc(100% - 1.6rem));
      margin: 1rem auto 0;
      display: flex;
      gap: 0.65rem;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      padding: 0.78rem 1rem;
      border: 1px solid rgba(255,255,255,0.06);
      background: rgba(8,12,22,0.52);
      backdrop-filter: blur(10px);
      box-shadow: 0 16px 34px rgba(0,0,0,0.18);
    }

    nav a {
      color: var(--text-soft);
      text-decoration: none;
      font-size: 0.95rem;
      padding: 0.45rem 0.85rem;
      border-radius: 999px;
      transition: background 0.22s ease, color 0.22s ease, transform 0.22s ease;
    }

    nav a:hover {
      background: rgba(255,255,255,0.08);
      color: #fff;
      transform: translateY(-1px);
    }

    .page {
      width: min(1240px, calc(100% - 2rem));
      margin: 0 auto 4rem;
      display: grid;
      gap: 1rem;
    }

    .panel {
      position: relative;
      overflow: hidden;
      border: 1px solid var(--panel-border);
      background: var(--panel-bg);
      box-shadow: var(--panel-shadow);
      backdrop-filter: blur(12px);
    }

    .panel::before {
      content: "";
      position: absolute;
      left: 0;
      top: 18px;
      bottom: 18px;
      width: 2px;
      background: linear-gradient(180deg, rgba(142,176,255,0.3), rgba(230,198,122,0.16));
      opacity: 0.9;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      font-size: 0.75rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(142,176,255,0.86);
    }

    .eyebrow::before {
      content: "";
      width: 26px;
      height: 1px;
      background: linear-gradient(90deg, rgba(142,176,255,0.9), rgba(255,255,255,0));
    }

    .hero {
      padding: 1rem 1.1rem 1.05rem 1.15rem;
      display: grid;
      gap: 0.95rem;
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3.1rem);
      line-height: 1.03;
      color: #fff;
      text-wrap: balance;
    }

    .hero-copy {
      margin: 0;
      max-width: 860px;
      color: var(--text-soft);
      line-height: 1.6;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 260px;
      gap: 0.8rem;
    }

    .hero-card,
    .state-pill {
      min-height: 78px;
      display: grid;
      gap: 0.22rem;
      padding: 0.82rem 0.92rem;
      border-radius: 16px;
      background: rgba(255,255,255,0.045);
      border: 1px solid rgba(255,255,255,0.06);
    }

    .hero-card span,
    .state-pill span {
      font-size: 0.7rem;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .hero-card strong {
      color: #fff;
      font-size: 0.98rem;
      line-height: 1.32;
      font-weight: 600;
    }

    .state-pill {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.55rem;
      text-align: center;
    }

    .state-dot {
      width: 0.58rem;
      height: 0.58rem;
      border-radius: 50%;
      background: var(--blue);
      box-shadow: 0 0 14px rgba(142,176,255,0.55);
      flex: 0 0 auto;
    }

    .state-pill.in_progress .state-dot { background: var(--cyan); box-shadow: 0 0 18px rgba(144,230,255,0.7); }
    .state-pill.ready_for_verdict .state-dot { background: var(--amber); box-shadow: 0 0 16px rgba(255,201,119,0.62); }
    .state-pill.resolved.success .state-dot { background: var(--green); box-shadow: 0 0 16px rgba(149,227,138,0.62); }
    .state-pill.resolved.failure .state-dot { background: var(--red); box-shadow: 0 0 16px rgba(255,156,156,0.62); }

    .main-grid {
      display: grid;
      grid-template-columns: 270px minmax(0, 1fr) 300px;
      gap: 1rem;
      align-items: start;
    }
    .lower-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    .lower-left, .lower-right {
      display: grid;
      gap: 0.85rem;
      align-content: start;
    }

    .side-panel {
      padding: 0.95rem 0.95rem 1rem 1.02rem;
      display: grid;
      gap: 0.85rem;
    }

    .panel-title { display: grid; gap: 0.25rem; position: relative; z-index: 1; }
    .panel-title h2 { margin: 0; color: #fff; font-size: 1.08rem; line-height: 1.2; }
    .panel-title p { margin: 0; color: var(--text-dim); line-height: 1.5; font-size: 0.9rem; }

    .info-list { display: grid; gap: 0.65rem; }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
      padding: 9px 16px;
      border-bottom: 0.5px solid rgba(255,255,255,0.05);
      background: transparent;
      border-radius: 0;
      border-top: none;
      border-left: none;
      border-right: none;
    }
    .info-row:last-child { border-bottom: none; }
    .info-row span   { font-size: 10px; letter-spacing: 0.09em; text-transform: uppercase; color: #3a4560; flex-shrink: 0; }
    .info-row strong { color: #c0b898; font-size: 12px; line-height: 1.4; font-weight: 400; text-align: right; }
    .info-row p      { display: none; }

    .center-panel { padding: 1rem 1rem 1.05rem; display: grid; gap: 0.95rem; }

    .center-top {
      display: grid;
      gap: 0.35rem;
      text-align: center;
      position: relative;
      z-index: 1;
      padding-inline: 0.8rem;
    }

    .lightning-name {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto;
      min-height: 42px;
      padding: 0.58rem 0.95rem;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.08);
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
      color: #fff;
      font-size: 0.88rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      box-shadow: 0 0 24px rgba(142,176,255,0.12);
      max-width: 100%;
      text-align: center;
    }

    .chamber {
      position: relative;
      overflow: hidden;
      border-radius: 12px 12px 0 0;
      border: 0.5px solid rgba(200,169,106,0.18);
      border-bottom: none;
      background: radial-gradient(ellipse at 50% 35%, #0d0d2a 0%, #05050f 75%);
      isolation: isolate;
    }
    .chamber::before { display: none; }
    .chamber-bottom-bar {
      background: rgba(9,9,18,0.98);
      border: 0.5px solid rgba(200,169,106,0.18);
      border-top: none;
      border-radius: 0 0 12px 12px;
    }
    .timer-row {
      display: flex; align-items: center; gap: 16px;
      padding: 13px 20px;
      border-bottom: 0.5px solid rgba(255,255,255,0.05);
    }
    .chamber-timer-val {
      font-size: 34px; font-weight: 500; color: var(--gold);
      letter-spacing: 0.04em; min-width: 90px;
    }
    .chamber-timer-val.urgent { color: #e05050; }
    .timer-track-wrap { flex: 1; }
    .timer-sublbl { font-size: 10px; color: #3a4560; text-transform: uppercase; letter-spacing: 0.09em; }
    .timer-track { height: 3px; background: rgba(255,255,255,0.06); border-radius: 2px; margin-top: 7px; overflow: hidden; }
    .timer-track-fill { height: 100%; background: var(--gold); border-radius: 2px; transition: width 1s linear; }
    .chamber-stats-strip {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      border-bottom: 0.5px solid rgba(255,255,255,0.05);
    }
    .chamber-stat-cell {
      padding: 12px 20px;
      border-right: 0.5px solid rgba(255,255,255,0.05);
    }
    .chamber-stat-cell:last-child { border-right: none; }
    .chamber-stat-lbl { font-size: 10px; color: #3a4560; text-transform: uppercase; letter-spacing: 0.08em; }
    .chamber-stat-val { font-size: 20px; font-weight: 500; color: var(--text); margin-top: 3px; }
    .chamber-stat-val.gold { color: var(--gold); }
    .chamber-stat-val.danger { color: #e05050; }
    .chamber-action-row { padding: 13px 20px; display: flex; gap: 10px; }

    .ring {
      position: absolute;
      left: 50%;
      top: 50%;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 0 26px rgba(142,176,255,0.12);
    }

    .ring.ring-a { width: 420px; height: 420px; animation: ringSpin 30s linear infinite; }
    .ring.ring-b { width: 300px; height: 300px; animation: ringSpinReverse 18s linear infinite; }
    .ring.ring-c { width: 188px; height: 188px; animation: ringSpin 11s linear infinite; }

    .ring::before {
      content: "";
      position: absolute;
      inset: 10%;
      border-radius: 50%;
      border: 1px dashed rgba(255,255,255,0.08);
    }

    .orb {
      position: relative;
      z-index: 2;
      width: 280px;
      height: 280px;
      border-radius: 50%;
      overflow: hidden;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 50% 38%, rgba(255,255,255,0.12), rgba(9,15,27,0.98) 72%);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: inset 0 0 36px rgba(255,255,255,0.04), 0 0 42px var(--orb-glow);
      isolation: isolate;
    }

    .orb-fill {
      position: absolute;
      left: 0; right: 0; bottom: 0;
      height: calc(var(--progress) * 1%);
      background:
        radial-gradient(circle at 50% 16%, rgba(255,255,255,0.28), transparent 22%),
        linear-gradient(180deg, var(--orb-fill-a), var(--orb-fill-b));
      box-shadow: 0 0 26px rgba(132,226,255,0.32);
      transition: height 0.32s linear;
      opacity: 0.95;
    }

    .orb-fill::before {
      content: "";
      position: absolute;
      left: -8%; right: -8%;
      top: -14px;
      height: 24px;
      border-radius: 50%;
      background: rgba(216,248,255,0.92);
      filter: blur(1px);
      opacity: 0.9;
    }

    .orb-glow {
      position: absolute;
      inset: 12%;
      border-radius: 50%;
      background:
        radial-gradient(circle at 50% 35%, rgba(255,255,255,0.18), transparent 26%),
        radial-gradient(circle at 50% 55%, rgba(142,176,255,0.16), transparent 48%);
      filter: blur(12px);
      animation: corePulse 3.2s ease-in-out infinite;
    }

    .bolt {
      position: absolute;
      top: -4%; left: 50%;
      width: 6px; height: 50%;
      background: linear-gradient(180deg, rgba(255,255,255,0.96), rgba(143,231,255,0.82), rgba(142,176,255,0.12));
      filter: blur(0.4px);
      opacity: 0;
      mix-blend-mode: screen;
      clip-path: polygon(45% 0%, 70% 9%, 52% 18%, 78% 28%, 50% 39%, 68% 48%, 42% 59%, 62% 70%, 38% 82%, 54% 100%, 0 100%, 24% 84%, 10% 69%, 30% 58%, 18% 42%, 38% 28%, 22% 15%, 40% 0%);
      box-shadow: 0 0 18px rgba(255,255,255,0.58), 0 0 38px rgba(143,231,255,0.28);
      transform-origin: top center;
    }

    .bolt.bolt-a { transform: translateX(-72px) rotate(-7deg) scaleY(1.08); }
    .bolt.bolt-b { transform: translateX(0) rotate(0deg) scaleY(1.12); height: 58%; }
    .bolt.bolt-c { transform: translateX(72px) rotate(8deg) scaleY(1); }

    body.in_progress .bolt,
    body.ready_for_verdict .bolt { opacity: 0.16; animation: boltFlash 3.6s infinite; }
    body.ready_for_verdict .bolt { opacity: 0.38; animation-duration: 1s; }

    .orb-content {
      position: relative;
      z-index: 2;
      display: grid;
      gap: 0.42rem;
      text-align: center;
      padding: 1.2rem 1.1rem;
      width: 100%;
    }

    .orb-phase { font-size: 0.72rem; letter-spacing: 0.16em; text-transform: uppercase; color: rgba(228,235,255,0.72); }
    .orb-scene-title { margin: 0; font-size: 1.35rem; line-height: 1.1; color: #fff; text-wrap: balance; }
    .orb-scene-copy { margin: 0 auto; max-width: 205px; min-height: 6.6em; color: var(--text-soft); line-height: 1.55; font-size: 0.9rem; text-wrap: balance; }

    .orb-action-state {
      margin: 0 auto;
      padding: 0.38rem 0.75rem;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.05);
      color: rgba(237,242,255,0.9);
      font-size: 0.76rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      max-width: 190px;
    }

    .center-bottom {
      display: grid;
      gap: 0.75rem;
      position: relative;
      z-index: 1;
      text-align: center;
      padding-inline: 0.8rem;
    }

    .progress-wrap { display: grid; gap: 0.6rem; width: min(720px, 100%); margin: 0 auto; }

    .progress-label-row {
      display: flex;
      justify-content: space-between;
      gap: 0.8rem;
      align-items: center;
      font-size: 0.84rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .progress-label-row strong { color: #fff; font-weight: 600; letter-spacing: 0.06em; }

    .progress-bar {
      width: 100%; height: 14px;
      border-radius: 999px; overflow: hidden;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.05);
    }

    .progress-fill {
      height: 100%;
      width: calc(var(--progress) * 1%);
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(142,176,255,0.92), rgba(143,231,255,0.92), rgba(230,198,122,0.88));
      box-shadow: 0 0 18px rgba(142,176,255,0.28);
      transition: width 0.28s linear;
    }

    .time-banner {
      min-height: 62px;
      display: grid;
      place-items: center;
      border-radius: 18px;
      border: 1px solid rgba(144,230,255,0.18);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03)),
        radial-gradient(circle at 50% 20%, rgba(144,230,255,0.18), transparent 60%);
      color: #fff;
      font-size: clamp(1.6rem, 4vw, 2.35rem);
      font-weight: 700;
      letter-spacing: 0.16em;
      box-shadow: inset 0 0 22px rgba(144,230,255,0.05), 0 0 26px rgba(142,176,255,0.12);
    }

    .progress-text { color: var(--text-soft); font-size: 0.95rem; line-height: 1.55; min-height: 3.1em; max-width: 760px; margin: 0 auto; }

    .page-note, .page-error { margin: 0; min-height: 1.3rem; text-align: center; line-height: 1.5; font-size: 0.92rem; }
    .page-note { color: rgba(143,231,255,0.88); }
    .page-error { color: rgba(255,201,201,0.94); }

    .control-row, .after-actions {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
    }

    .primary, .secondary, .ghost {
      appearance: none; border: 0; cursor: pointer; text-decoration: none;
      display: inline-flex; align-items: center; justify-content: center;
      min-height: 46px; padding: 0.8rem 1.15rem; border-radius: 14px; font: inherit;
      transition: transform 0.22s ease, box-shadow 0.22s ease, background 0.22s ease, border-color 0.22s ease, opacity 0.22s ease;
    }

    .primary {
      background:
        linear-gradient(180deg, rgba(255,255,255,0.14), rgba(255,255,255,0.07)),
        linear-gradient(90deg, rgba(142,176,255,0.88), rgba(143,231,255,0.88));
      color: #07101d;
      box-shadow: 0 12px 30px rgba(142,176,255,0.22);
      font-weight: 700;
    }

    .secondary { background: rgba(255,255,255,0.07); color: #fff; border: 1px solid rgba(255,255,255,0.09); }
    .ghost { background: transparent; color: var(--text-soft); border: 1px solid rgba(255,255,255,0.08); }

    .primary:hover, .secondary:hover, .ghost:hover { transform: translateY(-1px); }
    .primary:disabled, .secondary:disabled, .ghost:disabled { opacity: 0.45; cursor: not-allowed; transform: none; box-shadow: none; }

    /* ── VERDICT RESULT PANEL ───────────────────────────────────── */
    .verdict-result-panel {
      display: none;
      padding: 1.2rem 1.1rem 1.3rem 1.15rem;
      gap: 1.1rem;
      animation: verdictReveal 0.55s ease forwards;
    }

    .verdict-result-panel.active { display: grid; }

    @keyframes verdictReveal {
      from { opacity: 0; transform: translateY(18px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .verdict-banner {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1.15rem 1.25rem;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.04);
      position: relative;
      overflow: hidden;
    }

    .verdict-banner::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 20px;
      opacity: 0.08;
    }

    .verdict-banner.success { border-color: rgba(149,227,138,0.32); background: rgba(149,227,138,0.07); }
    .verdict-banner.success::before { background: radial-gradient(circle at 20% 50%, rgba(149,227,138,0.6), transparent 60%); opacity: 1; }

    .verdict-banner.failure { border-color: rgba(255,156,156,0.32); background: rgba(255,156,156,0.07); }
    .verdict-banner.failure::before { background: radial-gradient(circle at 20% 50%, rgba(255,156,156,0.5), transparent 60%); opacity: 1; }

    .verdict-banner.damaged { border-color: rgba(255,159,70,0.32); background: rgba(255,159,70,0.07); }
    .verdict-banner.damaged::before { background: radial-gradient(circle at 20% 50%, rgba(255,159,70,0.5), transparent 60%); opacity: 1; }

    .verdict-icon {
      width: 52px; height: 52px;
      border-radius: 50%;
      display: grid; place-items: center;
      font-size: 1.5rem;
      flex: 0 0 auto;
      position: relative;
      z-index: 1;
    }

    .verdict-banner.success .verdict-icon { background: rgba(149,227,138,0.18); border: 1px solid rgba(149,227,138,0.3); box-shadow: 0 0 22px rgba(149,227,138,0.18); }
    .verdict-banner.failure .verdict-icon { background: rgba(255,156,156,0.18); border: 1px solid rgba(255,156,156,0.3); box-shadow: 0 0 22px rgba(255,156,156,0.18); }
    .verdict-banner.damaged .verdict-icon { background: rgba(255,159,70,0.18); border: 1px solid rgba(255,159,70,0.3); box-shadow: 0 0 22px rgba(255,159,70,0.18); }

    .verdict-banner-text { display: grid; gap: 0.26rem; position: relative; z-index: 1; }

    .verdict-banner-kicker {
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .verdict-banner-title {
      font-size: clamp(1.2rem, 2.5vw, 1.7rem);
      font-weight: 700;
      color: #fff;
      line-height: 1.12;
    }

    .verdict-banner-copy {
      font-size: 0.92rem;
      line-height: 1.55;
      color: var(--text-soft);
      margin-top: 0.1rem;
      max-width: 680px;
    }

    .verdict-rewards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 0.75rem;
    }

    .verdict-reward-card {
      padding: 0.9rem 1rem;
      border-radius: 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      display: grid;
      gap: 0.25rem;
    }

    .verdict-reward-card.highlight-success {
      background: rgba(149,227,138,0.07);
      border-color: rgba(149,227,138,0.22);
    }

    .verdict-reward-card.highlight-warn {
      background: rgba(255,201,119,0.07);
      border-color: rgba(255,201,119,0.22);
    }

    .verdict-reward-card.highlight-danger {
      background: rgba(255,156,156,0.07);
      border-color: rgba(255,156,156,0.22);
    }

    .verdict-reward-label {
      font-size: 0.68rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .verdict-reward-value {
      font-size: 1.08rem;
      font-weight: 700;
      color: #fff;
      line-height: 1.2;
    }

    .verdict-reward-sub {
      font-size: 0.82rem;
      color: var(--text-soft);
      line-height: 1.42;
    }

    /* ── AFTER PANEL (existing) ─────────────────────────────────── */
    .after-panel { display: none; padding: 1rem 1rem 1.08rem 1.05rem; gap: 0.95rem; }
    .after-panel.active { display: grid; }

    .after-head { display: grid; gap: 0.3rem; text-align: center; position: relative; z-index: 1; }
    .after-head h2 { margin: 0; color: #fff; font-size: clamp(1.85rem, 4vw, 2.6rem); line-height: 1.06; text-wrap: balance; }
    .after-head p { margin: 0 auto; max-width: 860px; color: var(--text-soft); line-height: 1.6; text-wrap: balance; }

    .after-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 0.8rem; }

    .after-card {
      position: relative;
      padding: 0.92rem 0.92rem 0.96rem 0.98rem;
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(18,25,41,0.82), rgba(9,14,26,0.94));
      border: 1px solid rgba(255,255,255,0.07);
      display: grid;
      gap: 0.38rem;
      min-height: 156px;
    }

    .after-card::before {
      content: "";
      position: absolute;
      left: 0; top: 18px; bottom: 18px;
      width: 2px;
      background: linear-gradient(180deg, rgba(142,176,255,0.28), rgba(230,198,122,0.16));
    }

    .after-card span { padding-left: 0.32rem; font-size: 0.71rem; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(142,176,255,0.86); }
    .after-card strong { padding-left: 0.32rem; color: #fff; font-size: 1.05rem; line-height: 1.28; font-weight: 600; }
    .after-card p { margin: 0; padding-left: 0.32rem; color: var(--text-soft); font-size: 0.9rem; line-height: 1.56; }

    footer { width: min(1240px, calc(100% - 1.6rem)); margin: 0 auto 2rem; padding: 1rem; text-align: center; color: var(--text-dim); font-size: 0.92rem; }

    @keyframes skyDrift { 0% { transform: translateY(0) scale(1); } 100% { transform: translateY(-12px) scale(1.03); } }
    @keyframes mistDriftA { 0% { transform: translateX(-2%) translateY(0); } 50% { transform: translateX(2%) translateY(1.5%); } 100% { transform: translateX(-1%) translateY(0.2%); } }
    @keyframes mistDriftB { 0% { transform: translateX(1.5%) translateY(-0.5%); } 50% { transform: translateX(-1.8%) translateY(1.6%); } 100% { transform: translateX(2.2%) translateY(-0.2%); } }
    @keyframes ringSpin { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }
    @keyframes ringSpinReverse { from { transform: translate(-50%, -50%) rotate(360deg); } to { transform: translate(-50%, -50%) rotate(0deg); } }
    @keyframes corePulse { 0%, 100% { transform: scale(0.97); opacity: 0.62; } 50% { transform: scale(1.04); opacity: 1; } }
    @keyframes boltFlash { 0%, 78%, 100% { opacity: 0; } 79% { opacity: 0.65; } 80% { opacity: 1; } 82% { opacity: 0.32; } 83% { opacity: 0.9; } 85% { opacity: 0; } }

    @media (max-width: 1120px) { .main-grid { grid-template-columns: 1fr; } }

    @media (max-width: 860px) {
      .page { width: min(100% - 1rem, 1240px); }
      .hero, .side-panel, .center-panel, .after-panel, .verdict-result-panel { padding-left: 1rem; padding-right: 1rem; }
      .chamber { min-height: 520px; }
      .ring.ring-a { width: 360px; height: 360px; }
      .ring.ring-b { width: 260px; height: 260px; }
      .orb { width: 244px; height: 244px; }
    }

    @media (max-width: 640px) {
      nav { justify-content: flex-start; }
      .hero-grid { grid-template-columns: 1fr; }
      .chamber { min-height: 470px; }
      .ring.ring-a { width: 300px; height: 300px; }
      .ring.ring-b { width: 220px; height: 220px; }
      .ring.ring-c { width: 156px; height: 156px; }
      .orb { width: 214px; height: 214px; }
      .orb-scene-title { font-size: 1.16rem; }
      .control-row, .after-actions { flex-direction: column; }
      .control-row > *, .after-actions > * { width: 100%; }
      .progress-label-row { flex-direction: column; align-items: flex-start; }
      .time-banner { font-size: 1.55rem; letter-spacing: 0.12em; }
      .verdict-banner { flex-direction: column; text-align: center; }
      .verdict-rewards-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

  <footer>The Ascendant Path • Tribulation Chamber</footer>
  <script>
    const state = {
      payload: null,
      submitting: false,
      tickTimer: null,
      syncTimer: null,
      lightningTimer: null,
      boundaryRetryTimer: null
    };

    const $ = (id) => document.getElementById(id);

    function safeText(value, fallback = "") {
      const text = String(value ?? "").trim();
      return text || fallback;
    }

    function safeLower(value) { return safeText(value).toLowerCase(); }

    function safeNumber(value, fallback = 0) {
      const num = Number(value);
      return Number.isFinite(num) ? num : fallback;
    }

    function safeBoolean(value, fallback = false) {
      if (typeof value === "boolean") return value;
      if (value === "true" || value === 1 || value === "1") return true;
      if (value === "false" || value === 0 || value === "0") return false;
      return fallback;
    }

    function toTitle(value, fallback = "") {
      const text = safeText(value);
      if (!text) return fallback;
      return text.replace(/_/g, " ").toLowerCase().split(" ").filter(Boolean).map((p) => p.charAt(0).toUpperCase() + p.slice(1)).join(" ");
    }

    function formatCountdown(seconds) {
      const total = Math.max(0, Math.ceil(safeNumber(seconds, 0)));
      const hrs = Math.floor(total / 3600);
      const mins = Math.floor((total % 3600) / 60);
      const secs = total % 60;
      if (hrs > 0) return `${String(hrs).padStart(2, "0")}:${String(mins).padStart(2, "0")}:${String(secs).padStart(2, "0")}`;
      return `${String(mins).padStart(2, "0")}:${String(secs).padStart(2, "0")}`;
    }

    function formatDuration(totalSeconds) {
      const seconds = Math.max(0, Math.floor(safeNumber(totalSeconds, 0)));
      if (!seconds) return "0m";
      const hrs = Math.floor(seconds / 3600);
      const mins = Math.floor((seconds % 3600) / 60);
      const secs = seconds % 60;
      if (hrs > 0) return mins > 0 ? `${hrs}h ${mins}m` : `${hrs}h`;
      if (mins > 0) return secs > 0 ? `${mins}m ${secs}s` : `${mins}m`;
      return `${secs}s`;
    }

    function formatDateTime(value, fallback = "--") {
      const text = safeText(value);
      if (!text) return fallback;
      const date = new Date(text);
      if (Number.isNaN(date.getTime())) return fallback;
      return date.toLocaleString(undefined, { year: "numeric", month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" });
    }

    function createInfoRow(label, value, description) {
      return `<div class="info-row"><span>${label}</span><strong>${value || "--"}</strong>${description ? `<p>${description}</p>` : ""}</div>`;
    }

    function getVolumeFromQuery() {
      const raw = new URLSearchParams(window.location.search).get("volume");
      const n = Number(raw);
      return Number.isInteger(n) && n > 0 ? n : null;
    }

    function getBreakthrough() { return state.payload?.breakthrough || {}; }
    function getLinkedStage() { return getBreakthrough()?.linked_stage || null; }
    function getLatestAttempt() { return getBreakthrough()?.latest_attempt || null; }

    function getLifecycleStatus() {
      return safeLower(getBreakthrough()?.lifecycle_status || state.payload?.lifecycle_status);
    }

    function hasActiveBreakthrough() {
      return safeBoolean(state.payload?.has_active_breakthrough) || safeBoolean(getBreakthrough()?.exists);
    }

    function getPrimaryAction() { return state.payload?.next_action || getBreakthrough()?.next_action || null; }

    function getOutcome() {
      return safeLower(getBreakthrough()?.outcome || getLatestAttempt()?.outcome || "");
    }

    function getUiState() {
      if (!hasActiveBreakthrough()) return "not_started";
      const lifecycle = getLifecycleStatus();
      if (lifecycle === "active") return "in_progress";
      if (lifecycle === "timer_elapsed" || lifecycle === "battle_resolved") return "ready_for_verdict";
      if (["verdict_revealed","cooldown","success","failed_stable","failed_damaged","abandoned"].includes(lifecycle)) return "resolved";
      if (lifecycle === "countdown" || lifecycle === "pending") return "not_started";
      return "not_started";
    }

    function parseDateSafe(value) {
      const text = safeText(value);
      if (!text) return null;
      const date = new Date(text);
      return Number.isNaN(date.getTime()) ? null : date;
    }

    function getLivePhaseClock() {
      const bt = getBreakthrough();
      const lifecycle = getLifecycleStatus();
      const nowMs = Date.now();

      if (lifecycle === "countdown" || lifecycle === "pending") {
        const start = parseDateSafe(bt.countdown_started_at);
        const end = parseDateSafe(bt.countdown_ends_at);
        if (start && end && end.getTime() > start.getTime()) {
          const totalSeconds = Math.max(1, Math.round((end.getTime() - start.getTime()) / 1000));
          const remainingSeconds = Math.max(0, Math.ceil((end.getTime() - nowMs) / 1000));
          const elapsedSeconds = Math.max(0, totalSeconds - remainingSeconds);
          return { mode: "countdown", isLive: true, totalSeconds, remainingSeconds, elapsedSeconds, completed: remainingSeconds <= 0 };
        }
        const fallbackTotal = Math.max(1, safeNumber(bt.countdown_duration_seconds, 60));
        const fallbackRemaining = Math.max(0, safeNumber(bt.seconds_remaining, 0));
        return { mode: "countdown", isLive: true, totalSeconds: fallbackTotal, remainingSeconds: fallbackRemaining, elapsedSeconds: Math.max(0, fallbackTotal - fallbackRemaining), completed: fallbackRemaining <= 0 };
      }

      if (lifecycle === "active") {
        const start = parseDateSafe(bt.breakthrough_started_at);
        const end = parseDateSafe(bt.breakthrough_ends_at);
        if (start && end && end.getTime() > start.getTime()) {
          const totalSeconds = Math.max(1, Math.round((end.getTime() - start.getTime()) / 1000));
          const remainingSeconds = Math.max(0, Math.ceil((end.getTime() - nowMs) / 1000));
          const elapsedSeconds = Math.max(0, totalSeconds - remainingSeconds);
          return { mode: "active", isLive: true, totalSeconds, remainingSeconds, elapsedSeconds, completed: remainingSeconds <= 0 };
        }
        const fallbackTotal = Math.max(1, safeNumber(bt.breakthrough_duration_seconds, 1));
        const fallbackRemaining = Math.max(0, safeNumber(bt.seconds_remaining, 0));
        return { mode: "active", isLive: true, totalSeconds: fallbackTotal, remainingSeconds: fallbackRemaining, elapsedSeconds: Math.max(0, fallbackTotal - fallbackRemaining), completed: fallbackRemaining <= 0 };
      }

      return { mode: null, isLive: false, totalSeconds: 0, remainingSeconds: Math.max(0, safeNumber(getBreakthrough().seconds_remaining, 0)), elapsedSeconds: 0, completed: false };
    }

    function isBoundaryWaiting() {
      const lifecycle = getLifecycleStatus();
      const clock = getLivePhaseClock();
      return hasActiveBreakthrough() && (lifecycle === "countdown" || lifecycle === "pending" || lifecycle === "active") && clock.completed;
    }

    function clearBoundaryRetry() {
      if (state.boundaryRetryTimer) { clearTimeout(state.boundaryRetryTimer); state.boundaryRetryTimer = null; }
    }

    function scheduleBoundaryResync() {
      clearBoundaryRetry();
      if (state.submitting || !state.payload || !isBoundaryWaiting()) return;
      state.boundaryRetryTimer = setTimeout(async () => {
        if (state.submitting) return;
        await loadChamberState(true);
      }, 1200);
    }

    function getProgressPct() {
      const uiState = getUiState();
      const clock = getLivePhaseClock();
      if (uiState === "resolved" || uiState === "ready_for_verdict") return 100;
      if (clock.isLive && clock.totalSeconds > 0) return Math.max(0, Math.min(100, Math.round((clock.elapsedSeconds / clock.totalSeconds) * 100)));
      return 0;
    }

    function buildStageRouteLabel(bt) {
      const parts = [];
      if (bt.to_volume_number) parts.push(`Volume ${bt.to_volume_number}`);
      if (bt.to_section_key) parts.push(toTitle(bt.to_section_key));
      if (!parts.length) {
        if (bt.from_volume_number) parts.push(`Volume ${bt.from_volume_number}`);
        if (bt.from_section_key) parts.push(toTitle(bt.from_section_key));
      }
      return parts.join(" • ") || "--";
    }

    function buildThresholdLabel() {
      const bt = getBreakthrough();
      if (!hasActiveBreakthrough()) return "No active threshold";
      const parts = [];
      if (bt.target_type) parts.push(`${toTitle(bt.target_type)} Threshold`);
      const route = buildStageRouteLabel(bt);
      if (route && route !== "--") parts.push(route);
      return parts.join(" • ") || safeText(bt.lifecycle_label, "Active Threshold");
    }

    function buildLightningName() {
      const bt = getBreakthrough();
      if (bt.tribulation_family) return `Tribulation Lightning • ${toTitle(bt.tribulation_family)}`;
      return "Tribulation Lightning";
    }

    function buildHeroCopy() {
      const uiState = getUiState();
      const lifecycle = getLifecycleStatus();
      const bt = getBreakthrough();
      if (!hasActiveBreakthrough()) return "No active breakthrough is presently bound to the chamber. When a lawful threshold is formed, the chamber will display its state here.";
      if (lifecycle === "countdown" || lifecycle === "pending") return "A threshold has formed. The chamber is drawing the cultivator toward Heaven's trial.";
      if (uiState === "in_progress") return "The hidden battle is underway. The center now carries the tribulation lore, while the single timer below shows the live remaining time.";
      if (lifecycle === "timer_elapsed") return "The timer has elapsed. The hidden battle now waits for formal resolution.";
      if (lifecycle === "battle_resolved") return "The hidden battle has been resolved. Heaven's Verdict may now be received.";
      if (lifecycle === "verdict_revealed") return "Heaven's judgement has already been revealed. The chamber now displays the outcome, rewards, and aftermath.";
      if (lifecycle === "cooldown") return "The chamber is in cooldown and cannot be disturbed until the recovery burden clears.";
      if (bt.verdict_text) return bt.verdict_text;
      return "All visible state shown here is read from the backend breakthrough record.";
    }

    function getOutcomeLabel(outcome) {
      switch (safeLower(outcome)) {
        case "success": return "Success";
        case "failed_stable": return "Stable Failure";
        case "failed_damaged": return "Damaged Failure";
        default: return toTitle(outcome, "--");
      }
    }

    function getStageProgress01() {
      const clock = getLivePhaseClock();
      if (!clock.isLive || clock.totalSeconds <= 0) return 0;
      return Math.max(0, Math.min(1, clock.elapsedSeconds / clock.totalSeconds));
    }

    function getTribulationNarrative() {
      const bt = getBreakthrough();
      const lifecycle = getLifecycleStatus();
      const uiState = getUiState();
      const outcome = getOutcome();
      const progress01 = getStageProgress01();
      const progressPct = Math.round(progress01 * 100);
      const route = buildStageRouteLabel(bt);
      const family = toTitle(bt.tribulation_family, "Tribulation");

      if (!hasActiveBreakthrough()) {
        return { stageNumber: 0, stageLabel: "Dormant", phase: "Threshold Dormant", title: "No Active Trial", copy: "No breakthrough is currently bound to the chamber. When a lawful threshold is opened, Heaven's gaze will gather here.", progressCopy: "The chamber is empty. No active threshold is currently being judged.", aftermathCopy: "" };
      }

      if (lifecycle === "countdown" || lifecycle === "pending") {
        if (progressPct < 34) return { stageNumber: 1, stageLabel: "Omen Stage", phase: "Omen Stage", title: "Heaven's Omen Appears", copy: `The air changes around ${route || "the threshold"}. Wind pressure rises, the spiritual field turns unstable, and the sky begins to darken as Heaven notices the attempt.`, progressCopy: "The trial has not struck yet. The omen is spreading, and the chamber is showing the first signs of Heaven's attention.", aftermathCopy: "" };
        if (progressPct < 67) return { stageNumber: 2, stageLabel: "Heavenly Lock Stage", phase: "Heavenly Lock Stage", title: "The Attempt Is Marked", copy: "Heaven has locked onto the cultivator. The aura can no longer hide, the breakthrough can no longer be masked, and the trial has now recognised this ascent as real.", progressCopy: "The chamber is no longer simply preparing. Heaven has marked the attempt and sealed it into judgement.", aftermathCopy: "" };
        return { stageNumber: 3, stageLabel: "Gathering Stage", phase: "Gathering Stage", title: "Tribulation Clouds Gather", copy: `${family} pressure thickens above the chamber. Lightning gathers in silence, the atmosphere grows heavy, and weaker presences would be forced back from the edge of this storm.`, progressCopy: "Tribulation clouds are now fully gathering. The threshold is nearing the first true descent.", aftermathCopy: "" };
      }

      if (uiState === "in_progress") {
        if (progressPct < 18) return { stageNumber: 4, stageLabel: "First Descent Stage", phase: "First Descent Stage", title: "The First Bolt Falls", copy: `The opening strike of ${family} tribulation has descended. It is not yet the final judgement, but it is enough to test whether body, qi, and foundation can withstand what follows.`, progressCopy: "The first descent has begun. Heaven is testing whether the breakthrough is worthy of continuing.", aftermathCopy: "" };
        if (progressPct < 45) return { stageNumber: 5, stageLabel: "Trial Wave Stage", phase: "Trial Wave Stage", title: "The Trial Waves Begin", copy: "Wave after wave of tribulation lightning now descends. The body is pressured, the meridians strain, and the foundation is forced to endure more than a single strike was ever meant to test.", progressCopy: "The main body of the tribulation is underway. Each wave is heavier than the last.", aftermathCopy: "" };
        if (progressPct < 75) return { stageNumber: 5, stageLabel: "Trial Wave Stage", phase: "Trial Wave Stage", title: "Heaven Presses Deeper", copy: "The storm has moved beyond simple endurance. Qi is being spent, the inner pathways are under strain, and the cultivator's will is being tested as heavily as the flesh itself.", progressCopy: "The trial is deep in its violent middle. Endurance alone is no longer enough; foundation and will are both under judgement.", aftermathCopy: "" };

        if (!silent) $("page-error").textContent = "Failed to load Tribulation Chamber.";
      }
    }

    async function submitPrimaryAction() {
      const button = $("primary-action");
      if (button.disabled || state.submitting) return;

      const action = getPrimaryAction();
      const config = buildActionConfig(action);

      if (!action || !safeBoolean(action.can_act) || config.mode === "none") return;

      if (config.mode === "navigate") {
        const url = new URL(config.target, window.location.origin);
        const volumeNumber = getVolumeFromQuery();
        if (volumeNumber) url.searchParams.set("volume", String(volumeNumber));
        window.location.href = url.toString();
        return;
      }

      if (config.mode === "refresh") {
        await loadChamberState(false);
        return;
      }

      state.submitting = true;
      $("page-error").textContent = "";
      $("page-note").textContent = "Processing...";
      renderCenter();

      try {
        const basePayload = {
          sl_avatar_key: safeText(state.payload?.member?.sl_avatar_key || state.payload?.viewer?.sl_avatar_key),
          sl_username: safeText(state.payload?.member?.sl_username || state.payload?.viewer?.sl_username),
          breakthrough_state_id: safeText(getBreakthrough()?.breakthrough_state_id || getBreakthrough()?.id)
        };

        const response = await fetch(config.target, {
          method: "POST",
          credentials: "include",
          cache: "no-store",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(basePayload)
        });

        if (response.status === 401) { window.location.href = "/login.html"; return; }

        const data = await readJsonSafe(response);

        if (!response.ok || !data.success) {
          $("page-error").textContent = safeText(data?.message || data?.error, "Failed to complete the chamber action.");
          return;
        }

        $("page-note").textContent = safeText(data?.message, "Action completed.");

        // Reload state to get full verdict payload
        await loadChamberState(false);

        // Scroll to verdict result panel after verdict is revealed
        const isVerdictAction = config.target.includes("reveal-breakthrough-verdict") || config.target.includes("resolve-breakthrough-battle");
        if (isVerdictAction) {
          setTimeout(() => {
            const resultPanel = $("verdict-result-panel");
            if (resultPanel && resultPanel.classList.contains("active")) {
              resultPanel.scrollIntoView({ behavior: "smooth", block: "start" });
            }
          }, 400);
        }

      } catch (err) {
        console.error("submitPrimaryAction error:", err);
        $("page-error").textContent = "Failed to complete the chamber action.";
      } finally {
        state.submitting = false;
        if (state.payload) renderCenter();
      }
    }

    function init() {
      $("primary-action").addEventListener("click", submitPrimaryAction);
      startLiveTick();
      startSyncLoop();
      loadChamberState(false);
      window.addEventListener("beforeunload", () => {
        if (state.tickTimer) clearInterval(state.tickTimer);
        if (state.syncTimer) clearInterval(state.syncTimer);
        if (state.lightningTimer) clearTimeout(state.lightningTimer);
        if (state.boundaryRetryTimer) clearTimeout(state.boundaryRetryTimer);
      });
    }

    window.addEventListener("DOMContentLoaded", init);

    _ctx.clearRect(0,0,_W,_H);
    var now = Date.now();
    if (!_startTime) _startTime = now;
    var elapsed = (now - _startTime) / 1000;
    var rawProgress = Math.min(1, elapsed / _totalDuration);
    var aggression;
    if (rawProgress < 0.25) {
      aggression = rawProgress * 0.06;
    } else if (rawProgress < 0.75) {
      aggression = 0.015 + (rawProgress - 0.25) / 0.50 * 0.45;
    } else {
      aggression = 0.465 + (rawProgress - 0.75) / 0.25 * 0.535;
    }
    drawClouds(aggression);
    drawBgColorShift(aggression);
    drawRiftLines(aggression);
    var _isResolved = (typeof getUiState === 'function' && (getUiState() === 'resolved'));
    if (!_isCountdown && !_exitState && !_isResolved) {
      var boltRate = Math.max(3, Math.floor(22 * (1 - aggression * 0.7)));
      if (_frame % boltRate === 0) spawnBolt(aggression);
    }
    if (_isResolved && _bolts.length > 0 && _frame % 3 === 0) {
      _bolts.splice(0, 1);
    }
    drawBolts();
    drawParticles();
    drawEmbers(aggression);
    var exitAlpha = _exitState ? Math.max(0, 1 - (_exitFrame / 120)) : 1;
    if (exitAlpha < 1) _ctx.globalAlpha = exitAlpha;
    drawPlatform();
    drawGroundCracks(aggression);
    drawFigure(aggression);
    _ctx.globalAlpha = 1;
    drawQiTendrils(aggression);
    drawShockwave();
    _frame++;
  }

  function chamberInit() {
    _canvas = document.getElementById('chamber-canvas');
    if (!_canvas) return;
    _ctx = _canvas.getContext('2d');
    chamberResize();
    window.addEventListener('resize', chamberResize);
    loadFigure('male', function() {});
    loadFigure('female', function() {});
    chamberLoop();
  }

  window.chamberSyncState = function() {
    var m = state.payload && state.payload.member;
    var bt = state.payload && state.payload.breakthrough;
    if (m) {
      _gender  = m.gender || 'male';
      var qiC  = parseFloat(m.qi_current)  || 0;
      var qiM  = parseFloat(m.qi_maximum)  || 1;
      _qi      = qiM > 0 ? Math.min(1, Math.max(0.05, qiC/qiM)) : 0.5;
    }
    if (bt) {
      _family    = (bt.tribulation_family || 'tempering').toLowerCase();
      _isCountdown = (bt.lifecycle_status === 'countdown');
      if (!_exitState && (bt.lifecycle_status === 'success' || bt.outcome === 'success')) {
        _exitState = 'success'; _exitFrame = 0;
      } else if (!_exitState && (bt.lifecycle_status === 'failed_stable' || bt.lifecycle_status === 'failed_damaged' || bt.outcome === 'failed_stable' || bt.outcome === 'failed_damaged')) {
        _exitState = 'failure'; _exitFrame = 0;
      }
      _tribPower = parseFloat(bt.tribulation_power) || 100;
      _totalDuration = parseFloat(bt.breakthrough_duration_seconds) || 3600;
      if (bt.breakthrough_started_at) {
        _startTime = new Date(bt.breakthrough_started_at).getTime();
      }
    }
    if (!_figCache[_gender]) {
      loadFigure(_gender, function() {});
    }
    if (m) {
      var qiC2 = parseFloat(m.qi_current) || 0;
      var qiM2 = parseFloat(m.qi_maximum) || 1;
      var qiPct = qiM2 > 0 ? Math.round(qiC2 / qiM2 * 100) : 0;
      var elQi = document.getElementById('stat-qi-reserve');
      if (elQi) { elQi.textContent = qiPct + '%'; elQi.className = 'chamber-stat-val' + (qiPct < 30 ? ' danger' : ''); }
      var elStage = document.getElementById('stat-stage');
      if (elStage && m.v2_active_stage_key) {
        var parts = m.v2_active_stage_key.split(':');
        elStage.textContent = parts.length > 1 ? (parts[1].charAt(0).toUpperCase() + parts[1].slice(1)) : m.v2_active_stage_key;
      }
      var elTokens = document.getElementById('stat-tokens');
      if (elTokens) {
        var tokBal = parseFloat(m.ascension_tokens_balance) || 0;
        elTokens.textContent = tokBal > 0 ? tokBal.toLocaleString() : '--';
      }
      var elTf = document.getElementById('timer-track-fill');
      if (elTf) {
        var bt3 = state.payload && state.payload.breakthrough;
        if (bt3 && bt3.breakthrough_duration_seconds && bt3.breakthrough_started_at) {
          var durSecs = parseFloat(bt3.breakthrough_duration_seconds) || 1;
          var startMs = new Date(bt3.breakthrough_started_at).getTime();
          var nowMs = Date.now();
          var elapsedSecs = Math.max(0, (nowMs - startMs) / 1000);
          var remSecs = Math.max(0, durSecs - elapsedSecs);
          var timerPct = Math.min(100, Math.max(0, Math.round((remSecs / durSecs) * 100)));
          elTf.style.width = timerPct + '%';
          elTf.style.background = timerPct < 20 ? '#e05050' : timerPct < 40 ? '#e09040' : 'var(--gold)';
        } else {
          elTf.style.width = '100%';
        }
      }
    }
  };

  document.addEventListener('DOMContentLoaded', function() {
    chamberInit();
  });
})();
// ── End Tribulation Chamber Canvas ───────────────────────────
  </script>
