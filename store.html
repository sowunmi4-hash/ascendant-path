<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sacred Treasury | The Ascendant Path</title>
<link rel="stylesheet" href="/css/style.css" />
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap');
:root {
  --bg-void: #060608;
  --bg-deep: #0a0a10;
  --bg-surface: #0e0e16;
  --bg-card: #111119;
  --bg-card-hover: #15151f;
  --bg-elevated: #1a1a24;
  --gold: #c8a96a;
  --gold-dim: #a08548;
  --gold-bright: #e8cc8a;
  --gold-bg: #c8a96a0a;
  --gold-border: #c8a96a1a;
  --gold-glow: #c8a96a22;
  --text-primary: #d4cebf;
  --text-secondary: #8a8478;
  --text-dim: #555044;
  --text-faint: #333028;
  --border: #1a1a22;
  --border-hover: #2a2a33;
  --cat-cultivation: #5a9acc;
  --cat-bond: #cc6699;
  --cat-seeds: #55bb66;
  --cat-spells: #aa77dd;
  --cat-alchemy: #dd9944;
  --cat-materials: #88aacc;
  --cat-weapons: #cc5555;
  --cat-other: #999977;
  --font-display: 'Cinzel', serif;
  --font-body: 'Cormorant Garamond', serif;
  --font-ui: system-ui, -apple-system, sans-serif;
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 14px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg-void);
  color: var(--text-primary);
  font-family: var(--font-body);
  font-size: 16px;
  line-height: 1.6;
  min-height: 100vh;
}
/* HEADER */
.store-header {
  position: sticky;
  top: 0;
  z-index: 50;
  background: var(--bg-void);
  border-bottom: 0.5px solid var(--gold-border);
}
.store-header-inner {
  max-width: 1100px;
  margin: 0 auto;
  padding: 16px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.store-brand {
  display: flex;
  align-items: baseline;
  gap: 10px;
}
.store-brand-title {
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 500;
  color: var(--gold);
  letter-spacing: 2px;
}
.store-brand-sub {
  font-family: var(--font-body);
  font-size: 13px;
  color: var(--text-dim);
  font-style: italic;
}
.token-display {
  display: flex;
  align-items: center;
  gap: 10px;
}
.token-badge {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--gold-bg);
  border: 0.5px solid var(--gold-border);
  border-radius: 24px;
  padding: 6px 16px 6px 8px;
}
.token-icon {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: var(--gold-border);
  display: flex;
  align-items: center;
  justify-content: center;
}
.token-icon svg {
  width: 14px;
  height: 14px;
}
.token-amount {
  font-family: var(--font-display);
  font-size: 15px;
  font-weight: 500;
  color: var(--gold);
}
.token-label {
  font-size: 11px;
  color: var(--text-dim);
  font-family: var(--font-ui);
}
/* TABS */
.store-tabs-wrap {
  background: var(--bg-deep);
  border-bottom: 0.5px solid var(--border);
  position: sticky;
  top: 56px;
  z-index: 40;
}
.store-tabs {
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 24px;
  display: flex;
  gap: 0;
  overflow-x: auto;
  scrollbar-width: none;
}
.store-tabs::-webkit-scrollbar { display: none; }
.store-tab {
  padding: 14px 20px;
  font-family: var(--font-display);
  font-size: 12px;
  font-weight: 400;
  letter-spacing: 1.5px;
  color: var(--text-dim);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  white-space: nowrap;
  transition: color 0.25s, border-color 0.25s;
  user-select: none;
}
.store-tab:hover {
  color: var(--text-secondary);
}
.store-tab.active {
  color: var(--gold);
  border-bottom-color: var(--gold);
}
.store-tab .tab-count {
  font-family: var(--font-ui);
  font-size: 10px;
  color: var(--text-faint);
  margin-left: 5px;
}
.store-tab.active .tab-count {
  color: var(--gold-dim);
}
/* SEARCH + FILTER BAR */
.store-toolbar {
  max-width: 1100px;
  margin: 0 auto;
  padding: 20px 24px 8px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.search-wrap {
  flex: 1;
  position: relative;
}
.search-wrap input {
  width: 100%;
  background: var(--bg-surface);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-md);
  padding: 10px 14px 10px 38px;
  color: var(--text-primary);
  font-family: var(--font-body);
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}
.search-wrap input::placeholder {
  color: var(--text-dim);
  font-style: italic;
}
.search-wrap input:focus {
  border-color: var(--gold-border);
}
.search-icon {
  position: absolute;
  left: 13px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-dim);
  font-size: 14px;
  pointer-events: none;
}
.sort-select {
  background: var(--bg-surface);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-md);
  padding: 10px 14px;
  color: var(--text-secondary);
  font-family: var(--font-body);
  font-size: 13px;
  outline: none;
  cursor: pointer;
}
/* ITEM GRID */
.store-body {
  max-width: 1100px;
  margin: 0 auto;
  padding: 16px 24px 60px;
}
.item-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 14px;
}
.item-card {
  background: var(--bg-card);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 18px;
  cursor: pointer;
  transition: border-color 0.25s, transform 0.2s, background 0.25s;
  display: flex;
  flex-direction: column;
}
.item-card:hover {
  border-color: var(--border-hover);
  background: var(--bg-card-hover);
  transform: translateY(-2px);
}
.card-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
.cat-tag {
  font-family: var(--font-ui);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  padding: 3px 10px;
  border-radius: 12px;
}
.cat-tag[data-cat="cultivation"] { color: var(--cat-cultivation); background: #5a9acc12; border: 0.5px solid #5a9acc22; }
.cat-tag[data-cat="bond"]       { color: var(--cat-bond); background: #cc669912; border: 0.5px solid #cc669922; }
.cat-tag[data-cat="seeds"]      { color: var(--cat-seeds); background: #55bb6612; border: 0.5px solid #55bb6622; }
.cat-tag[data-cat="spells"]     { color: var(--cat-spells); background: #aa77dd12; border: 0.5px solid #aa77dd22; }
.cat-tag[data-cat="alchemy"]    { color: var(--cat-alchemy); background: #dd994412; border: 0.5px solid #dd994422; }
.cat-tag[data-cat="materials"]  { color: var(--cat-materials); background: #88aacc12; border: 0.5px solid #88aacc22; }
.cat-tag[data-cat="weapons"]    { color: var(--cat-weapons); background: #cc555512; border: 0.5px solid #cc555522; }
.card-badge {
  font-family: var(--font-ui);
  font-size: 10px;
  font-weight: 500;
  padding: 3px 10px;
  border-radius: 12px;
}
.badge-owned { color: #55bb66; background: #55bb6612; border: 0.5px solid #55bb6622; }
.badge-sold  { color: #cc4444; background: #cc444412; border: 0.5px solid #cc444422; }
.badge-new   { color: var(--gold); background: var(--gold-bg); border: 0.5px solid var(--gold-border); }
.card-name {
  font-family: var(--font-display);
  font-size: 14px;
  font-weight: 400;
  color: #ddd5c8;
  letter-spacing: 0.5px;
  margin-bottom: 6px;
}
.card-desc {
  font-family: var(--font-body);
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.45;
  margin-bottom: 14px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  flex: 1;
}
.card-bottom {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-top: 12px;
  border-top: 0.5px solid var(--border);
}
.card-price {
  font-family: var(--font-display);
  font-size: 14px;
  font-weight: 500;
  color: var(--gold);
  letter-spacing: 0.5px;
}
.card-stock {
  font-family: var(--font-ui);
  font-size: 11px;
  color: var(--text-dim);
}
/* EMPTY STATE */
.empty-state {
  grid-column: 1 / -1;
  text-align: center;
  padding: 60px 20px;
}
.empty-state-icon {
  font-size: 32px;
  color: var(--text-faint);
  margin-bottom: 12px;
}
.empty-state-text {
  font-family: var(--font-body);
  font-size: 16px;
  color: var(--text-dim);
  font-style: italic;
}
.empty-state-sub {
  font-family: var(--font-ui);
  font-size: 12px;
  color: var(--text-faint);
  margin-top: 6px;
}
/* DETAIL PANEL (OVERLAY) */
.detail-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(4,4,8,0.88);
  z-index: 100;
  overflow-y: auto;
  padding: 40px 20px;
}
.detail-overlay.open { display: block; }
.detail-panel {
  max-width: 480px;
  margin: 0 auto;
  background: var(--bg-surface);
  border: 0.5px solid var(--gold-border);
  border-radius: var(--radius-lg);
  overflow: hidden;
}
.detail-panel-header {
  padding: 24px 24px 16px;
  border-bottom: 0.5px solid var(--border);
}
.detail-close {
  float: right;
  cursor: pointer;
  color: var(--text-dim);
  font-size: 22px;
  line-height: 1;
  padding: 2px 6px;
  border-radius: 4px;
  transition: color 0.2s;
}
.detail-close:hover { color: var(--gold); }
.detail-cat {
  margin-bottom: 10px;
}
.detail-name {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 500;
  color: #ddd5c8;
  letter-spacing: 0.5px;
  margin-bottom: 8px;
}
.detail-desc {
  font-family: var(--font-body);
  font-size: 15px;
  color: var(--text-secondary);
  line-height: 1.55;
}
.detail-panel-body {
  padding: 20px 24px 24px;
}
.detail-stats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 20px;
}
.detail-stat {
  background: var(--bg-card);
  border-radius: var(--radius-md);
  padding: 12px 14px;
}
.detail-stat-label {
  font-family: var(--font-ui);
  font-size: 11px;
  color: var(--text-dim);
  margin-bottom: 3px;
}
.detail-stat-value {
  font-family: var(--font-display);
  font-size: 16px;
  font-weight: 500;
  color: var(--gold);
}
.detail-stat-value.negative { color: #cc4444; }
.detail-stat-value.positive { color: #55bb66; }
.detail-note {
  font-family: var(--font-body);
  font-size: 13px;
  color: var(--text-dim);
  font-style: italic;
  margin-bottom: 16px;
  padding: 10px 14px;
  background: var(--bg-card);
  border-radius: var(--radius-sm);
  border-left: 2px solid var(--gold-border);
}
.detail-buy-btn {
  width: 100%;
  padding: 14px;
  background: var(--gold);
  color: var(--bg-void);
  border: none;
  border-radius: var(--radius-md);
  font-family: var(--font-display);
  font-size: 14px;
  font-weight: 500;
  letter-spacing: 1px;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.1s;
}
.detail-buy-btn:hover { opacity: 0.92; }
.detail-buy-btn:active { transform: scale(0.98); }
.detail-buy-btn:disabled {
  background: var(--bg-elevated);
  color: var(--text-dim);
  cursor: not-allowed;
}
/* RESPONSIVE */
@media (max-width: 768px) {
  .store-header-inner { padding: 12px 16px; }
  .store-brand-sub { display: none; }
  .store-tabs { padding: 0 16px; }
  .store-tab { padding: 12px 14px; font-size: 11px; }
  .store-toolbar { padding: 16px 16px 6px; flex-direction: column; }
  .search-wrap { width: 100%; }
  .sort-select { width: 100%; }
  .store-body { padding: 12px 16px 60px; }
  .item-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
  .item-card { padding: 14px; }
  .card-name { font-size: 13px; }
  .detail-overlay { padding: 20px 12px; }
}
@media (max-width: 420px) {
  .item-grid { grid-template-columns: 1fr; }
}
/* SITE NAV */
.site-nav {
  width: fit-content;
  max-width: 100%;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.55rem;
  flex-wrap: wrap;
  padding: 0.75rem 0.9rem;
  border-radius: 999px;
  background:
    linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01)),
    rgba(6, 10, 18, 0.74);
  border: 1px solid rgba(255,255,255,0.06);
  box-shadow: 0 14px 34px rgba(0, 0, 0, 0.22);
  backdrop-filter: blur(10px);
}
.site-nav a {
  padding: 0.62rem 0.92rem;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.04);
  background: rgba(255,255,255,0.02);
  color: var(--text-secondary);
  font-family: var(--font-ui);
  font-size: 0.84rem;
  text-decoration: none;
  transition: 0.18s ease;
}
.site-nav a:hover {
  transform: translateY(-1px);
  color: var(--text-primary);
  border-color: rgba(200, 169, 106, 0.22);
  background: rgba(255,255,255,0.04);
}
.site-nav a.active {
  color: var(--gold);
  border-color: rgba(200, 169, 106, 0.28);
  background: rgba(200, 169, 106, 0.10);
  box-shadow: inset 0 0 0 1px rgba(200, 169, 106, 0.05);
}
.site-nav-wrap {
  padding: 1rem 0 0;
  position: relative;
  z-index: 60;
}
@media (max-width: 768px) {
  .site-nav { gap: 0.35rem; padding: 0.55rem 0.65rem; }
  .site-nav a { padding: 0.5rem 0.7rem; font-size: 0.78rem; }
}

/* ── Ambient Background Canvas ── */
#ambient-bg-canvas {
  position: fixed;
  top: 0; left: 0;
  width: 100vw; height: 100vh;
  z-index: 0;
  pointer-events: none;
}
body > *:not(#ambient-bg-canvas) {
  position: relative;
  z-index: 1;
}
</style>
</head>
<body>
<canvas id="ambient-bg-canvas"></canvas>

<!-- SITE NAV -->
<div class="site-nav-wrap">
  <nav class="site-nav" aria-label="Global">
    <a href="/index.html">Home</a>
    <a href="/lore.html">Lore</a>
    <a href="/dashboard.html">Dashboard</a>
    <a href="/store.html" class="active">Store</a>
    <a href="/library.html">Library</a>
    <a href="/.netlify/functions/logout" id="logout-button">Logout</a>
  </nav>
</div>
<!-- HEADER -->
<header class="store-header">
  <div class="store-header-inner">
    <div class="store-brand">
      <span class="store-brand-title">SACRED TREASURY</span>
      <span class="store-brand-sub">The Ascendant Path</span>
    </div>
    <div class="token-display">
      <div class="token-badge">
        <div class="token-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="9" stroke="#c8a96a"/>
            <path d="M12 7v10M9 12h6" stroke="#c8a96a" stroke-width="1.5"/>
          </svg>
        </div>
        <span class="token-amount" id="token-balance">0</span>
      </div>
      <span class="token-label">Ascension Tokens</span>
    </div>
  </div>
</header>
<!-- TABS -->
<nav class="store-tabs-wrap">
  <div class="store-tabs" id="store-tabs"></div>
</nav>
<!-- TOOLBAR -->
<div class="store-toolbar">
  <div class="search-wrap">
    <span class="search-icon">&#9906;</span>
    <input type="text" id="store-search" placeholder="Search the treasury..." />
  </div>
  <select class="sort-select" id="store-sort">
    <option value="default">Sort: Default</option>
    <option value="price-asc">Price: Low to High</option>
    <option value="price-desc">Price: High to Low</option>
    <option value="name">Name: A-Z</option>
    <option value="stock">Stock: Low First</option>
  </select>
</div>
<!-- GRID -->
<main class="store-body">
  <div class="item-grid" id="item-grid"></div>
</main>
<!-- DETAIL OVERLAY -->
<div class="detail-overlay" id="detail-overlay">
  <div class="detail-panel" id="detail-panel"></div>
</div>
<script>
/* STATE */
var state = {
  activeTab: 'all',
  searchQuery: '',
  sortBy: 'default',
  wallet: { ascension_tokens_balance: 0, wallet_found: false },
  items: [],
  session: null
};
var CATEGORIES = [
  { key: 'all',         label: 'All' },
  { key: 'cultivation', label: 'Cultivation' },
  { key: 'bond',        label: 'Bond' },
  { key: 'seeds',       label: 'Seeds' },
  { key: 'spells',      label: 'Spell Books' },
  { key: 'alchemy',     label: 'Alchemy' },
  { key: 'materials',   label: 'Materials' },
  { key: 'weapons',     label: 'Weapons' }
];
var CURRENCY_NAME = 'Ascension Tokens';
var LOGIN_PAGE_URL = '/login.html';
var VERIFY_SESSION_URL = '/.netlify/functions/verify-session';
var LIST_STORE_URL = '/.netlify/functions/list-store-items';
var BUY_STORE_URL = '/.netlify/functions/buy-store-item';
var COOKIE_NAME = 'ap_session';
/* HELPERS */
function safeText(v, fb) { var t = String(v || '').trim(); return t || (fb || ''); }
function safeNumber(v, fb) { var n = Number(v); return Number.isFinite(n) ? n : (fb || 0); }
function formatNumber(n) { return Number(n).toLocaleString(); }
function escapeHtml(s) {
  var d = document.createElement('div');
  d.appendChild(document.createTextNode(s));
  return d.innerHTML;
}
/* AUTH */
async function authFetch(url, options) {
  options = options || {};
  var response = await fetch(url, Object.assign({}, options, {
    credentials: 'include',
    cache: 'no-store',
    headers: Object.assign({ Accept: 'application/json' }, options.headers || {})
  }));
  if (response.status === 401 || response.status === 403) {
    window.location.href = LOGIN_PAGE_URL;
    throw new Error('Session expired.');
  }
  return response;
}
async function verifySession() {
  try {
    var response = await authFetch(VERIFY_SESSION_URL, { method: 'GET' });
    var data = await response.json();
    if (!response.ok || !data.success) {
      window.location.href = LOGIN_PAGE_URL;
      return;
    }
    var member = data.member || data.viewer || data.session || data.user || {};
    state.session = {
      sl_avatar_key: safeText(member.sl_avatar_key || member.avatar_key),
      sl_username: safeText(member.sl_username || member.username),
      display_name: safeText(member.display_name)
    };
  } catch (e) {
    console.error('verifySession error:', e);
    window.location.href = LOGIN_PAGE_URL;
  }
}
/* DATA LOADING */
async function loadStoreData() {
  try {
    var response = await authFetch(LIST_STORE_URL, { method: 'GET' });
    var data = await response.json();
    if (!data.success) {
      console.error('Store load failed:', data.message);
      return;
    }
    state.wallet = {
      ascension_tokens_balance: safeNumber(data.wallet && data.wallet.ascension_tokens_balance, 0),
      wallet_found: !!(data.wallet && data.wallet.wallet_found)
    };
    state.items = (data.items || []).map(function(item) {
      return {
        id: item.id,
        item_key: item.item_key,
        category: safeText(item.category, 'cultivation').toLowerCase(),
        item_type: safeText(item.item_type, 'cultivation_volume'),
        name: safeText(item.item_name),
        description: safeText(item.description),
        price: safeNumber(item.price_amount, 0),
        stock: safeNumber(item.stock, 0),
        in_stock: item.stock > 0,
        owned: Boolean(item.owned),
        can_afford: Boolean(item.can_afford),
        can_purchase: Boolean(item.can_purchase),
        tokens_needed: safeNumber(item.tokens_needed, 0),
        purchase_block_reason: item.purchase_block_reason || null,
        volume_number: safeNumber(item.volume_number, 0),
        is_shared_purchase: Boolean(item.is_shared_purchase),
        bond_volume_state: item.bond_volume_state || null,
        section_statuses: item.section_statuses || null,
        owned_volume_status: item.owned_volume_status || null
      };
    });
    renderAll();
  } catch (e) {
    console.error('loadStoreData error:', e);
  }
}
/* RENDERING */
function renderAll() {
  renderTokenBalance();
  renderTabs();
  renderGrid();
}
function renderTokenBalance() {
  var el = document.getElementById('token-balance');
  if (el) el.textContent = formatNumber(state.wallet.ascension_tokens_balance);
}
function renderTabs() {
  var tabsEl = document.getElementById('store-tabs');
  if (!tabsEl) return;
  var counts = {};
  state.items.forEach(function(it) {
    counts[it.category] = (counts[it.category] || 0) + 1;
  });
  tabsEl.innerHTML = CATEGORIES.map(function(cat) {
    var count = cat.key === 'all' ? state.items.length : (counts[cat.key] || 0);
    var active = state.activeTab === cat.key ? ' active' : '';
    var countStr = count > 0 ? '<span class="tab-count">(' + count + ')</span>' : '<span class="tab-count">(0)</span>';
    return '<div class="store-tab' + active + '" data-tab="' + cat.key + '">'
      + escapeHtml(cat.label) + countStr + '</div>';
  }).join('');
  tabsEl.querySelectorAll('.store-tab').forEach(function(tab) {
    tab.addEventListener('click', function() {
      state.activeTab = tab.getAttribute('data-tab');
      renderTabs();
      renderGrid();
    });
  });
}
function getFilteredItems() {
  var items = state.items.filter(function(it) {
    if (state.activeTab !== 'all' && it.category !== state.activeTab) return false;
    if (state.searchQuery) {
      var q = state.searchQuery.toLowerCase();
      if (it.name.toLowerCase().indexOf(q) === -1 && it.description.toLowerCase().indexOf(q) === -1) return false;
    }
    return true;
  });
  if (state.sortBy === 'price-asc') items.sort(function(a,b) { return a.price - b.price; });
  else if (state.sortBy === 'price-desc') items.sort(function(a,b) { return b.price - a.price; });
  else if (state.sortBy === 'name') items.sort(function(a,b) { return a.name.localeCompare(b.name); });
  else if (state.sortBy === 'stock') items.sort(function(a,b) { return a.stock - b.stock; });
  return items;
}
function renderGrid() {
  var gridEl = document.getElementById('item-grid');
  if (!gridEl) return;
  var items = getFilteredItems();
  if (items.length === 0) {
    var emptyMsg = state.searchQuery
      ? 'No items match your search.'
      : 'No items available in this category yet.';
    gridEl.innerHTML = '<div class="empty-state">'
      + '<div class="empty-state-icon">&#9670;</div>'
      + '<div class="empty-state-text">' + escapeHtml(emptyMsg) + '</div>'
      + '<div class="empty-state-sub">New wares arrive with each celestial cycle.</div>'
      + '</div>';
    return;
  }
  gridEl.innerHTML = items.map(function(it) {
    var badge = '';
    if (it.owned) badge = '<span class="card-badge badge-owned">Owned</span>';
    else if (!it.in_stock) badge = '<span class="card-badge badge-sold">Sold out</span>';
    var catLabel = it.category.charAt(0).toUpperCase() + it.category.slice(1);
    return '<div class="item-card" data-item-id="' + it.id + '">'
      + '<div class="card-top">'
      + '<span class="cat-tag" data-cat="' + escapeHtml(it.category) + '">' + escapeHtml(catLabel) + '</span>'
      + badge
      + '</div>'
      + '<div class="card-name">' + escapeHtml(it.name) + '</div>'
      + '<div class="card-desc">' + escapeHtml(it.description) + '</div>'
      + '<div class="card-bottom">'
      + '<span class="card-price">' + formatNumber(it.price) + ' AT</span>'
      + '<span class="card-stock">' + it.stock + ' in stock</span>'
      + '</div>'
      + '</div>';
  }).join('');
  gridEl.querySelectorAll('.item-card').forEach(function(card) {
    card.addEventListener('click', function() {
      var id = parseInt(card.getAttribute('data-item-id'), 10);
      showDetail(id);
    });
  });
}
/* DETAIL PANEL */
function showDetail(id) {
  var item = null;
  for (var i = 0; i < state.items.length; i++) {
    if (state.items[i].id === id) { item = state.items[i]; break; }
  }
  if (!item) return;
  var overlay = document.getElementById('detail-overlay');
  var panel = document.getElementById('detail-panel');
  if (!overlay || !panel) return;
  var balance = state.wallet.ascension_tokens_balance;
  var canAfford = balance >= item.price;
  var afterBalance = canAfford ? balance - item.price : balance;
  var btnText, btnDisabled;
  if (item.owned) { btnText = 'Already Owned'; btnDisabled = true; }
  else if (!item.in_stock) { btnText = 'Sold Out'; btnDisabled = true; }
  else if (item.purchase_block_reason === 'active_partnership_required') { btnText = 'Partnership Required'; btnDisabled = true; }
  else if (!canAfford) { btnText = 'Need ' + formatNumber(item.tokens_needed) + ' More Tokens'; btnDisabled = true; }
  else { btnText = 'Offer ' + formatNumber(item.price) + ' Tokens'; btnDisabled = false; }
  var catLabel = item.category.charAt(0).toUpperCase() + item.category.slice(1);
  var noteHtml = '';
  if (item.purchase_block_reason === 'active_partnership_required') {
    noteHtml = '<div class="detail-note">This is a bond volume. You need an active partnership to purchase.</div>';
  } else if (!canAfford && !item.owned) {
    noteHtml = '<div class="detail-note">You need ' + formatNumber(item.tokens_needed) + ' more ' + CURRENCY_NAME + ' to claim this.</div>';
  } else if (item.is_shared_purchase) {
    noteHtml = '<div class="detail-note">This is a shared purchase. Both partners must offer their share.</div>';
  }
  panel.innerHTML = '<div class="detail-panel-header">'
    + '<span class="detail-close" id="detail-close-btn">&times;</span>'
    + '<div class="detail-cat"><span class="cat-tag" data-cat="' + escapeHtml(item.category) + '">' + escapeHtml(catLabel) + '</span></div>'
    + '<div class="detail-name">' + escapeHtml(item.name) + '</div>'
    + '<div class="detail-desc">' + escapeHtml(item.description) + '</div>'
    + '</div>'
    + '<div class="detail-panel-body">'
    + '<div class="detail-stats">'
    + '<div class="detail-stat"><div class="detail-stat-label">Price</div><div class="detail-stat-value">' + formatNumber(item.price) + ' AT</div></div>'
    + '<div class="detail-stat"><div class="detail-stat-label">In stock</div><div class="detail-stat-value">' + item.stock + '</div></div>'
    + '<div class="detail-stat"><div class="detail-stat-label">Your balance</div><div class="detail-stat-value">' + formatNumber(balance) + ' AT</div></div>'
    + '<div class="detail-stat"><div class="detail-stat-label">After purchase</div><div class="detail-stat-value ' + (canAfford ? 'positive' : 'negative') + '">' + (canAfford ? formatNumber(afterBalance) + ' AT' : '---') + '</div></div>'
    + '</div>'
    + noteHtml
    + '<button class="detail-buy-btn" id="detail-buy-btn" ' + (btnDisabled ? 'disabled' : '') + '>' + escapeHtml(btnText) + '</button>'
    + '</div>';
  overlay.classList.add('open');
  document.getElementById('detail-close-btn').addEventListener('click', closeDetail);
  overlay.addEventListener('click', function(e) {
    if (e.target === overlay) closeDetail();
  });
  if (!btnDisabled) {
    document.getElementById('detail-buy-btn').addEventListener('click', function() {
      buyItem(item);
    });
  }
}
function closeDetail() {
  var overlay = document.getElementById('detail-overlay');
  if (overlay) overlay.classList.remove('open');
}
/* PURCHASE */
async function buyItem(item) {
  if (!state.session || !state.session.sl_avatar_key) {
    window.location.href = LOGIN_PAGE_URL;
    return;
  }
  var btn = document.getElementById('detail-buy-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Processing...'; }
  try {
    var response = await authFetch(BUY_STORE_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        sl_avatar_key: state.session.sl_avatar_key,
        sl_username: state.session.sl_username,
        item_key: item.item_key
      })
    });
    var data = await response.json();
    if (data.success) {
      if (data.wallet) {
        state.wallet.ascension_tokens_balance = safeNumber(data.wallet.balance_after, state.wallet.ascension_tokens_balance);
      }
      await loadStoreData();
      closeDetail();
    } else {
      if (btn) { btn.disabled = false; btn.textContent = data.message || 'Purchase failed. Try again.'; }
    }
  } catch (e) {
    console.error('buyItem error:', e);
    if (btn) { btn.disabled = false; btn.textContent = 'Error. Try again.'; }
  }
}
/* EVENT LISTENERS */
document.getElementById('store-search').addEventListener('input', function(e) {
  state.searchQuery = e.target.value;
  renderGrid();
});
document.getElementById('store-sort').addEventListener('change', function(e) {
  state.sortBy = e.target.value;
  renderGrid();
});
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeDetail();
});
/* INIT */
(async function init() {
  await verifySession();
  await loadStoreData();
})();
</script>

<script>
(function() {
  var cv = document.getElementById('ambient-bg-canvas');
  if (!cv) return;
  var W, H, cx, cy, baseR, ctx, dpr;
  var _t = Math.random() * 20;
  var _stars = [];
  var _raf = null;

  function resize() {
    dpr = window.devicePixelRatio || 1;
    W = window.innerWidth;
    H = window.innerHeight;
    cv.width = W * dpr;
    cv.height = H * dpr;
    cv.style.width = W + 'px';
    cv.style.height = H + 'px';
    ctx = cv.getContext('2d');
    ctx.scale(dpr, dpr);
    cx = W / 2;
    cy = H / 2;
    baseR = Math.min(W, H) * 0.28;
  }

  function initStars(count) {
    _stars = [];
    for (var i = 0; i < count; i++) {
      _stars.push({
        x: Math.random(), y: Math.random(),
        sz: 0.4 + Math.random() * 1.2,
        sp: 0.0002 + Math.random() * 0.0006,
        ph: Math.random() * 6.28,
        bright: 0.15 + Math.random() * 0.3
      });
    }
  }

  function drawBg() {
    ctx.fillStyle = '#060608';
    ctx.fillRect(0, 0, W, H);
  }

  function drawHalo() {
    var g = ctx.createRadialGradient(cx, cy, 0, cx, cy, baseR + 100);
    g.addColorStop(0, 'rgba(200,169,106,0.025)');
    g.addColorStop(1, 'rgba(6,6,8,0)');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);
  }

  function drawMountains() {
    ctx.save();
    ctx.globalAlpha = 0.22;
    ctx.fillStyle = '#1a1a28';
    ctx.beginPath();
    ctx.moveTo(0, H);
    ctx.lineTo(0, H * 0.90);
    ctx.lineTo(W * 0.06, H * 0.85);
    ctx.lineTo(W * 0.12, H * 0.88);
    ctx.lineTo(W * 0.20, H * 0.82);
    ctx.lineTo(W * 0.28, H * 0.86);
    ctx.lineTo(W * 0.36, H * 0.80);
    ctx.lineTo(W * 0.44, H * 0.84);
    ctx.lineTo(W * 0.52, H * 0.78);
    ctx.lineTo(W * 0.60, H * 0.83);
    ctx.lineTo(W * 0.68, H * 0.79);
    ctx.lineTo(W * 0.76, H * 0.85);
    ctx.lineTo(W * 0.84, H * 0.81);
    ctx.lineTo(W * 0.92, H * 0.87);
    ctx.lineTo(W, H * 0.90);
    ctx.lineTo(W, H);
    ctx.closePath();
    ctx.fill();
    var mist = ctx.createLinearGradient(0, H * 0.88, 0, H);
    mist.addColorStop(0, 'rgba(14,14,20,0)');
    mist.addColorStop(1, 'rgba(26,26,40,0.12)');
    ctx.globalAlpha = 1;
    ctx.fillStyle = mist;
    ctx.fillRect(0, H * 0.88, W, H * 0.12);
    ctx.restore();
  }

  function drawStars(t) {
    ctx.save();
    for (var i = 0; i < _stars.length; i++) {
      var s = _stars[i];
      s.y -= s.sp;
      if (s.y < -0.01) { s.y = 1.01; s.x = Math.random(); }
      var flicker = 0.6 + Math.sin(t * 1.5 + s.ph) * 0.4;
      ctx.globalAlpha = s.bright * flicker;
      ctx.fillStyle = 'rgba(200,169,106,0.7)';
      ctx.beginPath();
      ctx.arc(s.x * W, s.y * H, s.sz, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  function drawRuneSeal(t) {
    ctx.save();
    var alpha = 0.06;
    ctx.strokeStyle = 'rgba(200,169,106,0.4)';
    ctx.lineWidth = 1;

    // Outer ring
    ctx.globalAlpha = alpha;
    ctx.beginPath();
    ctx.arc(cx, cy, baseR * 1.05, 0, Math.PI * 2);
    ctx.stroke();

    // Inner ring
    ctx.beginPath();
    ctx.arc(cx, cy, baseR * 0.65, 0, Math.PI * 2);
    ctx.stroke();

    // Rune glyphs
    var runes = ['\u2727','\u2726','\u2734','\u2735','\u2721','\u2742','\u2720','\u273A','\u2736','\u2737','\u2738','\u2739'];
    ctx.font = (Math.max(8, baseR * 0.07)) + 'px serif';
    ctx.fillStyle = 'rgba(200,169,106,0.35)';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    var phase = t * 0.2;
    for (var i = 0; i < 12; i++) {
      var a = (i / 12) * Math.PI * 2 + phase;
      var rx = cx + Math.cos(a) * baseR * 0.85;
      var ry = cy + Math.sin(a) * baseR * 0.85;
      ctx.globalAlpha = 0.05 + Math.sin(t * 0.7 + i) * 0.02;
      ctx.fillText(runes[i], rx, ry);
    }

    // Cross lines
    ctx.globalAlpha = 0.04;
    ctx.strokeStyle = 'rgba(200,169,106,0.3)';
    for (var j = 0; j < 4; j++) {
      var la = (j / 4) * Math.PI * 2 + t * -0.1;
      ctx.beginPath();
      ctx.moveTo(cx + Math.cos(la) * baseR * 0.65, cy + Math.sin(la) * baseR * 0.65);
      ctx.lineTo(cx + Math.cos(la) * baseR * 1.05, cy + Math.sin(la) * baseR * 1.05);
      ctx.stroke();
    }

    ctx.restore();
  }

  function drawQiVeins(t) {
    ctx.save();
    var pulse = 0.5 + Math.sin(t * 0.6) * 0.3;
    ctx.globalAlpha = 0.08 * pulse;
    ctx.strokeStyle = 'rgba(200,169,106,0.3)';
    ctx.lineWidth = 0.8;
    for (var v = 0; v < 5; v++) {
      var angle = (v / 5) * Math.PI * 2 + t * 0.015;
      ctx.beginPath();
      var px = cx, py = cy;
      ctx.moveTo(px, py);
      for (var s = 0; s < 6; s++) {
        var drift = Math.sin(t * 0.4 + v + s * 2) * 0.3;
        px += Math.cos(angle + drift) * baseR * 0.25;
        py += Math.sin(angle + drift) * baseR * 0.25;
        ctx.lineTo(px, py);
      }
      ctx.stroke();
    }
    ctx.restore();
  }

  function draw() {
    _t += 0.016;
    drawBg();
    drawHalo();
    drawMountains();
    drawStars(_t);
    drawQiVeins(_t);
    drawRuneSeal(_t);
    _raf = requestAnimationFrame(draw);
  }

  resize();
  initStars(80);
  window.addEventListener('resize', function() {
    resize();
    initStars(80);
  });
  draw();
})();
</script>
